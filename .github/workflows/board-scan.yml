name: Board Scan (daily signals)

# 코인/선물 일봉 닫힘 (00:00 UTC) 이후 +15분에 스캔.
# 주식 (stock_kr / stock_us) 은 Yahoo Finance 의 Vercel IP 차단 (429) 이슈로
# 일시 비활성화. universe 가 빈 배열이라 스캔해도 무의미해서 스케줄 자체를 뺌.
# 데이터 소스 안정화 후 재개 예정.
#
# 수동 실행 (workflow_dispatch) 으로 stock kind 선택 시에도 빈 결과만 나옴.

on:
  schedule:
    - cron: "15 0 * * *"
  workflow_dispatch:
    inputs:
      kind:
        description: "수동 실행 시 스캔할 kind (없으면 코인+선물)"
        required: false
        type: choice
        options: ["", "crypto", "crypto_fut", "stock_kr", "stock_us", "all"]
        default: ""

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Resolve kinds to scan
        id: kinds
        shell: bash
        run: |
          set -euo pipefail
          manual="${{ github.event.inputs.kind }}"
          if [ -n "$manual" ] && [ "$manual" != "all" ]; then
            echo "list=$manual" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$manual" = "all" ]; then
            # 수동 'all' 은 stocks 까지 시도 (실패해도 다른 kind 영향 X)
            echo "list=crypto,crypto_fut,stock_kr,stock_us" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          # 크론 트리거 — 현재 코인/선물만. 주식은 빈 universe 라 스킵.
          echo "list=crypto,crypto_fut" >> "$GITHUB_OUTPUT"

      - name: Scan each kind
        if: steps.kinds.outputs.list != ''
        shell: bash
        env:
          SITE_URL: ${{ vars.SITE_URL }}
          ADMIN_TOKEN: ${{ secrets.ADMIN_TOKEN }}
        run: |
          set -euo pipefail
          IFS=',' read -ra kinds <<< "${{ steps.kinds.outputs.list }}"
          for k in "${kinds[@]}"; do
            echo "::group::scan kind=$k"
            # maxDuration=60s. 실패해도 다음 kind 로 계속.
            curl -fsS -X POST \
              -H "Authorization: Bearer $ADMIN_TOKEN" \
              -H "Content-Length: 0" \
              --max-time 90 \
              "$SITE_URL/api/admin/board-scan?kind=$k" \
              | tee /tmp/resp.json || echo "scan failed for $k"
            echo
            echo "::endgroup::"
          done
