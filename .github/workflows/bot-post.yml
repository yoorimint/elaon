name: bot post

on:
  # 한국시간 09시 ~ 22시 사이를 넉넉히 커버하려고 UTC 기준 0시~14시 매시간.
  # KST = UTC+9. 스크립트 안에서도 한 번 더 시간/확률 체크한다.
  schedule:
    - cron: "0 0-14 * * *"
  workflow_dispatch: # 수동 실행 버튼 — 클릭만으로 무조건 강제 발행 (체크박스 불필요)

permissions:
  contents: read

concurrency:
  group: bot-post
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run bot
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BOT_FORCE: ${{ github.event_name == 'workflow_dispatch' && '1' || '' }}
        run: npx tsx --tsconfig tsconfig.json scripts/bot-post.ts
