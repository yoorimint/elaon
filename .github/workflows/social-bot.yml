name: social bot

# SNS 자동 포스팅. social_content_pool 에서 랜덤 1개 뽑아 X/Threads/Bluesky 에 포스팅.
# KST 09:00~23:00 (UTC 00~14) 매시간 = 하루 최대 15개. 풀 비면 자동 스킵.
# 사용된 row 는 성공 시 삭제 → 풀 소진되면 다음 social-content-scan 실행에서 재생성.

on:
  schedule:
    - cron: "0 0-14 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: social-bot
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Run social bot
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          SITE_URL: ${{ vars.SITE_URL }}
          X_API_KEY: ${{ secrets.X_API_KEY }}
          X_API_SECRET: ${{ secrets.X_API_SECRET }}
          X_ACCESS_TOKEN: ${{ secrets.X_ACCESS_TOKEN }}
          X_ACCESS_TOKEN_SECRET: ${{ secrets.X_ACCESS_TOKEN_SECRET }}
          THREADS_USER_ID: ${{ secrets.THREADS_USER_ID }}
          THREADS_ACCESS_TOKEN: ${{ secrets.THREADS_ACCESS_TOKEN }}
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
        run: npx tsx --tsconfig tsconfig.json scripts/social-bot.ts
