<title>{{ page.title }} | eloan.kr</title>
<meta name="description" content="{{ page.description | default: site.description }}">
<meta property="og:title" content="{{ page.title }}">
<meta property="og:description" content="{{ page.description | default: site.description }}">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Noto Sans KR',-apple-system,sans-serif;background:#F4F5F7;color:#191F28;line-height:1.8;-webkit-font-smoothing:antialiased}
.wrap{max-width:540px;margin:0 auto;padding:0 16px 80px}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:12px 0}
.topbar-logo{font-size:16px;font-weight:800;color:#191F28;text-decoration:none}
.topbar-nav{display:flex;gap:16px}
.topbar-nav a{font-size:13px;font-weight:500;color:#8B95A1;text-decoration:none}
.topbar-nav a:hover{color:#3182F6}
.topbar-nav a.active{font-weight:600;color:#3182F6}
.footer{text-align:center;padding:32px 0;font-size:11px;color:#8B95A1}
.footer a{color:#8B95A1;text-decoration:none}

  <nav class="topbar-nav">

  </nav>
</div>

{{ content }}
