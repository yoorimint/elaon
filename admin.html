<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 - eloan.kr</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://accounts.google.com/gsi/client" async defer></script>
<style>
:root {
  --primary: #1B65E3;
  --primary-dark: #0F4ABF;
  --primary-light: #E8F0FE;
  --accent: #00C48C;
  --danger: #EF4444;
  --warning: #F59E0B;
  --bg: #F5F6FA;
  --card: #FFFFFF;
  --text: #1A1D26;
  --text-sub: #6B7280;
  --text-light: #9CA3AF;
  --border: #E5E7EB;
  --shadow: 0 2px 12px rgba(27,101,227,0.08);
  --radius: 16px;
  --radius-sm: 10px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Noto Sans KR',-apple-system,sans-serif; background:var(--bg); color:var(--text); line-height:1.6; }
.container { max-width:640px; margin:0 auto; padding:0 20px; }

/* Login */
.login-wrap {
  min-height:100vh; display:flex; align-items:center; justify-content:center;
}
.login-card {
  background:var(--card); border-radius:var(--radius); padding:40px 32px;
  box-shadow:var(--shadow); width:100%; max-width:400px; text-align:center;
}
.login-card h1 { font-size:22px; font-weight:800; margin-bottom:8px; }
.login-card p { font-size:13px; color:var(--text-sub); margin-bottom:24px; }
.login-input {
  width:100%; height:48px; border:1.5px solid var(--border); border-radius:var(--radius-sm);
  padding:0 16px; font-size:15px; font-family:inherit; margin-bottom:12px;
  transition:border-color 0.2s;
}
.login-input:focus { outline:none; border-color:var(--primary); }
.login-btn {
  width:100%; height:48px; border:none; border-radius:var(--radius-sm);
  background:var(--primary); color:#fff; font-size:15px; font-weight:700;
  font-family:inherit; cursor:pointer; transition:background 0.2s;
}
.login-btn:hover { background:var(--primary-dark); }
.login-error { color:var(--danger); font-size:13px; margin-top:8px; display:none; }

/* Header */
.header {
  background:var(--primary); padding:16px 0; position:sticky; top:0; z-index:100;
}
.header-inner { display:flex; align-items:center; gap:12px; }
.header-title { color:#fff; font-size:17px; font-weight:700; }
.header-badge {
  margin-left:auto; background:rgba(255,255,255,0.2); color:#fff;
  font-size:11px; font-weight:600; padding:3px 8px; border-radius:12px;
}
.logout-btn {
  background:rgba(255,255,255,0.2); border:none; color:#fff; font-size:12px;
  padding:6px 12px; border-radius:8px; cursor:pointer; font-family:inherit;
}

/* Admin Panel */
.admin-panel { display:none; }
.admin-panel.show { display:block; }

.section-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:20px 0 12px;
}
.section-title { font-size:16px; font-weight:700; }
.section-badge {
  font-size:11px; font-weight:600; padding:3px 10px; border-radius:12px;
}

.card {
  background:var(--card); border-radius:var(--radius); padding:20px;
  box-shadow:var(--shadow); margin-bottom:14px;
}
.card-title {
  font-size:14px; font-weight:700; margin-bottom:14px;
  padding-bottom:10px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:8px;
}
.card-title .dot {
  width:8px; height:8px; border-radius:50%; flex-shrink:0;
}

.form-row {
  display:flex; gap:12px; margin-bottom:12px; align-items:flex-end;
}
.form-group { flex:1; }
.form-label {
  font-size:12px; font-weight:600; color:var(--text-sub);
  margin-bottom:4px; display:block;
}
.form-input {
  width:100%; height:40px; border:1.5px solid var(--border); border-radius:8px;
  padding:0 12px; font-size:14px; font-family:inherit; color:var(--text);
  background:#FAFBFC; transition:border-color 0.2s;
}
.form-input:focus { outline:none; border-color:var(--primary); background:#fff; }
.form-input.changed { border-color:var(--warning); background:#FFFBEB; }

/* Status */
.status-bar {
  position:fixed; bottom:0; left:0; right:0; z-index:200;
  background:var(--card); border-top:1px solid var(--border);
  padding:12px 20px; display:none; box-shadow:0 -4px 20px rgba(0,0,0,0.1);
}
.status-bar.show { display:flex; align-items:center; justify-content:space-between; gap:12px; }
.status-text { font-size:13px; color:var(--text-sub); }
.status-text strong { color:var(--warning); }
.save-btn {
  height:42px; border:none; border-radius:var(--radius-sm);
  background:var(--accent); color:#fff; font-size:14px; font-weight:700;
  padding:0 24px; cursor:pointer; font-family:inherit; white-space:nowrap;
  transition:background 0.2s;
}
.save-btn:hover { background:#00A374; }
.save-btn:disabled { background:var(--text-light); cursor:not-allowed; }

/* Toast */
.toast {
  position:fixed; top:80px; left:50%; transform:translateX(-50%);
  background:var(--text); color:#fff; padding:12px 24px; border-radius:var(--radius-sm);
  font-size:14px; font-weight:600; z-index:300; display:none;
  box-shadow:0 8px 30px rgba(0,0,0,0.2);
}
.toast.show { display:block; animation:fadeUp 0.3s ease; }
.toast.success { background:var(--accent); }
.toast.error { background:var(--danger); }

/* Auto Update */
.auto-card {
  background:linear-gradient(135deg,#1B65E3 0%,#6366F1 100%);
  border-radius:var(--radius); padding:24px 20px; margin-bottom:20px; color:#fff;
}
.auto-card h2 { font-size:18px; font-weight:800; margin-bottom:6px; }
.auto-card p { font-size:13px; opacity:0.85; margin-bottom:16px; }
.auto-btn {
  width:100%; height:52px; border:none; border-radius:var(--radius-sm);
  background:#fff; color:var(--primary); font-size:16px; font-weight:800;
  font-family:inherit; cursor:pointer; transition:all 0.2s;
  letter-spacing:-0.3px;
}
.auto-btn:hover { background:#E8F0FE; }
.auto-btn:disabled { opacity:0.6; cursor:not-allowed; }
.auto-btn .spinner {
  display:inline-block; width:16px; height:16px; border:2px solid var(--primary-light);
  border-top-color:var(--primary); border-radius:50%; animation:spin 0.8s linear infinite;
  vertical-align:middle; margin-right:8px;
}
@keyframes spin { to { transform:rotate(360deg); } }

.auto-log {
  margin-top:14px; background:rgba(0,0,0,0.2); border-radius:var(--radius-sm);
  padding:14px; font-size:12px; max-height:300px; overflow-y:auto;
  display:none; line-height:1.8;
}
.auto-log.show { display:block; }
.auto-log .ok { color:#86EFAC; }
.auto-log .warn { color:#FCD34D; }
.auto-log .err { color:#FCA5A5; }
.auto-log .info { color:rgba(255,255,255,0.7); }

.preview-card {
  background:var(--card); border-radius:var(--radius); padding:20px;
  box-shadow:var(--shadow); margin-bottom:14px; display:none;
}
.preview-card.show { display:block; }
.preview-title {
  font-size:15px; font-weight:700; margin-bottom:14px;
  display:flex; align-items:center; gap:8px;
}
.preview-row {
  display:flex; justify-content:space-between; align-items:center;
  padding:8px 0; border-bottom:1px solid var(--border); font-size:13px;
}
.preview-row:last-child { border-bottom:none; }
.preview-old { color:var(--text-light); text-decoration:line-through; }
.preview-new { color:var(--accent); font-weight:700; }
.preview-same { color:var(--text-sub); }
.apply-btn {
  width:100%; height:48px; border:none; border-radius:var(--radius-sm);
  background:var(--accent); color:#fff; font-size:15px; font-weight:700;
  font-family:inherit; cursor:pointer; margin-top:14px; transition:background 0.2s;
}
.apply-btn:hover { background:#00A374; }
.apply-btn:disabled { background:var(--text-light); cursor:not-allowed; }
.settings-card {
  background:var(--primary-light); border-radius:var(--radius);
  padding:16px 20px; margin-bottom:14px;
}
.settings-title { font-size:13px; font-weight:700; color:var(--primary-dark); margin-bottom:8px; }
.settings-row { display:flex; gap:8px; margin-bottom:8px; }
.settings-input {
  flex:1; height:36px; border:1px solid var(--border); border-radius:6px;
  padding:0 10px; font-size:13px; font-family:inherit;
}

@keyframes fadeUp {
  from { opacity:0; transform:translate(-50%,10px); }
  to { opacity:1; transform:translate(-50%,0); }
}
</style>
</head>

<script>
/* ── Config ── */
const ALLOWED_EMAIL = 'ylis0219@gmail.com';
const GOOGLE_CLIENT_ID = ''; // Google Cloud Console에서 OAuth 2.0 클라이언트 ID 입력
const GH_TOKEN_KEY = 'eloan_gh_token';
const GH_REPO_KEY = 'eloan_gh_repo';
const DATA_PATH = 'data/rates.json';

let currentData = null;
let originalData = null;
let changeCount = 0;
let googleAuthed = false;

function getNestedValue(obj, path) {
  return path.split('.').reduce((o, k) => o && o[k], obj);
}

function setNestedValue(obj, path, value) {
  const keys = path.split('.');
  const last = keys.pop();
  const target = keys.reduce((o, k) => o[k], obj);
  target[last] = value;
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (type || '');
  setTimeout(() => t.className = 'toast', 3000);
}

/* ── Google Login ── */
function decodeJwtPayload(token) {
  const base64 = token.split('.')[1].replace(/-/g, '+').replace(/_/g, '/');
  return JSON.parse(atob(base64));
}

function handleGoogleLogin(response) {
  const payload = decodeJwtPayload(response.credential);
  const email = payload.email;

  if (email !== ALLOWED_EMAIL) {
    document.getElementById('loginError').style.display = 'block';
    document.getElementById('loginError').textContent = '허가되지 않은 계정입니다: ' + email;
    document.getElementById('githubStep').style.display = 'none';
    return;
  }

  googleAuthed = true;
  document.getElementById('loginError').style.display = 'none';
  document.getElementById('googleEmail').textContent = email + ' 인증됨';
  document.getElementById('googleLoginBtn').style.display = 'none';
  document.getElementById('githubStep').style.display = 'block';

  // GitHub token이 저장되어 있으면 자동 진행
  const savedToken = localStorage.getItem(GH_TOKEN_KEY);
  if (savedToken) {
    document.getElementById('githubToken').value = savedToken;
    document.getElementById('githubRepo').value = localStorage.getItem(GH_REPO_KEY) || 'yoorimint/elaon';
    doGithubLogin();
  }
}

function doGithubLogin() {
  if (!googleAuthed) return;

  const token = document.getElementById('githubToken').value;
  const repo = document.getElementById('githubRepo').value;

  if (!token) {
    document.getElementById('loginError').style.display = 'block';
    document.getElementById('loginError').textContent = 'GitHub Token을 입력해주세요';
    return;
  }

  localStorage.setItem(GH_TOKEN_KEY, token);
  localStorage.setItem(GH_REPO_KEY, repo);

  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('adminPanel').classList.add('show');

  loadData();
}

function doLogout() {
  googleAuthed = false;
  localStorage.removeItem(GH_TOKEN_KEY);
  document.getElementById('adminPanel').classList.remove('show');
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('githubToken').value = '';
  document.getElementById('githubStep').style.display = 'none';
  document.getElementById('googleLoginBtn').style.display = 'flex';
}

/* ── GitHub API ── */
async function ghGet(path) {
  const token = localStorage.getItem(GH_TOKEN_KEY);
  const repo = localStorage.getItem(GH_REPO_KEY);
  const resp = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
    headers: {
      'Authorization': `token ${token}`,
      'Accept': 'application/vnd.github.v3+json'
    }
  });
  if (!resp.ok) throw new Error(`GitHub GET failed: ${resp.status}`);
  return resp.json();
}

async function ghPut(path, content, message, sha) {
  const token = localStorage.getItem(GH_TOKEN_KEY);
  const repo = localStorage.getItem(GH_REPO_KEY);
  const body = {
    message: message,
    content: btoa(unescape(encodeURIComponent(content))),
    branch: 'main'
  };
  if (sha) body.sha = sha;

  const resp = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
    method: 'PUT',
    headers: {
      'Authorization': `token ${token}`,
      'Accept': 'application/vnd.github.v3+json',
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(body)
  });
  if (!resp.ok) throw new Error(`GitHub PUT failed: ${resp.status}`);
  return resp.json();
}

/* ── Load Data ── */
async function loadData() {
  try {
    document.getElementById('githubStatus').textContent = 'GitHub에서 데이터 로딩 중...';

    const file = await ghGet(DATA_PATH);
    const content = decodeURIComponent(escape(atob(file.content)));
    currentData = JSON.parse(content);
    currentData._sha = file.sha;
    originalData = JSON.parse(content);

    document.getElementById('githubStatus').innerHTML =
      '<span style="color:#059669;">연결됨</span> · ' + localStorage.getItem(GH_REPO_KEY);
    document.getElementById('lastUpdated').textContent =
      '최종: ' + (currentData.lastUpdated || '-');

    populateForm();
    showToast('데이터 로드 완료', 'success');
  } catch (e) {
    document.getElementById('githubStatus').innerHTML =
      '<span style="color:#EF4444;">연결 실패</span> · ' + e.message;
    showToast('데이터 로드 실패: ' + e.message, 'error');
  }
}

/* ── Populate Form ── */
function populateForm() {
  document.querySelectorAll('.form-input[data-path]').forEach(input => {
    const val = getNestedValue(currentData, input.dataset.path);
    if (val !== undefined) input.value = val;

    input.addEventListener('input', function() {
      const origVal = getNestedValue(originalData, this.dataset.path);
      const newVal = this.type === 'number' ? parseFloat(this.value) : this.value;

      if (String(origVal) !== String(newVal)) {
        this.classList.add('changed');
      } else {
        this.classList.remove('changed');
      }

      setNestedValue(currentData, this.dataset.path, newVal);
      updateChangeCount();
    });
  });
}

function updateChangeCount() {
  changeCount = document.querySelectorAll('.form-input.changed').length;
  document.getElementById('changeCount').textContent = changeCount;

  const bar = document.getElementById('statusBar');
  if (changeCount > 0) {
    bar.classList.add('show');
  } else {
    bar.classList.remove('show');
  }
}

/* ── Save ── */
async function saveChanges() {
  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.textContent = '저장 중...';

  try {
    // Update timestamp
    currentData.lastUpdated = new Date().toISOString().split('T')[0];

    // Remove internal fields
    const saveData = JSON.parse(JSON.stringify(currentData));
    delete saveData._sha;

    const content = JSON.stringify(saveData, null, 2);

    await ghPut(
      DATA_PATH,
      content,
      `데이터 업데이트: ${currentData.lastUpdated}`,
      currentData._sha
    );

    // Reload to get new SHA
    const file = await ghGet(DATA_PATH);
    currentData._sha = file.sha;
    originalData = JSON.parse(JSON.stringify(saveData));

    // Reset change indicators
    document.querySelectorAll('.form-input.changed').forEach(i => i.classList.remove('changed'));
    updateChangeCount();

    document.getElementById('lastUpdated').textContent = '최종: ' + currentData.lastUpdated;

    showToast('GitHub에 저장 완료! 사이트에 자동 반영됩니다.', 'success');
  } catch (e) {
    showToast('저장 실패: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'GitHub에 저장';
  }
}

const CORS_PROXY = 'https://api.allorigins.win/raw?url=';

function log(msg, type) {
  const el = document.getElementById('autoLog');
  el.classList.add('show');
  const cls = type || 'info';
  el.innerHTML += `<div class="${cls}">${msg}</div>`;
  el.scrollTop = el.scrollHeight;
}

async function fetchViaProxy(url) {
  const resp = await fetch(CORS_PROXY + encodeURIComponent(url));
  if (!resp.ok) throw new Error(`Fetch failed: ${resp.status}`);
  return resp.text();
}

function extractNumbers(html, patterns) {
  const results = {};
  for (const [key, regex] of Object.entries(patterns)) {
    const match = html.match(regex);
    if (match) results[key] = parseFloat(match[1]);
  }
  return results;
}

async function fetchHFRates() {
  log('한국주택금융공사 금리 조회 중...');

    const html = await fetchViaProxy('https://www.hf.go.kr/ko/sub01/sub01_01_04.do');
    // 보금자리론 금리 파싱
    const rateMatches = [...html.matchAll(/(\d+\.\d+)\s*%/g)].map(m => parseFloat(m[1]));
    const validRates = rateMatches.filter(r => r >= 2.0 && r <= 8.0);
    if (validRates.length >= 2) {
      fetchedRates['bogeumjari.rateMin'] = Math.min(...validRates);
      fetchedRates['bogeumjari.rateMax'] = Math.max(...validRates);
      log(`보금자리론: ${fetchedRates['bogeumjari.rateMin']}% ~ ${fetchedRates['bogeumjari.rateMax']}%`, 'ok');
    } else {
      log('보금자리론 금리 파싱 실패 - 수동 확인 필요', 'warn');
    }
  } catch (e) {
    log('HF 사이트 접근 실패: ' + e.message, 'err');
  }
}

async function autoUpdate() {
  const btn = document.getElementById('autoBtn');
  const logEl = document.getElementById('autoLog');

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>가져오는 중...';
  logEl.innerHTML = '';
  logEl.classList.add('show');
  fetchedRates = {};

  log('공식 사이트에서 최신 데이터를 가져옵니다...', 'info');
  log('─────────────────────────────', 'info');

  // 병렬로 모든 소스에서 가져오기
  await Promise.allSettled([
    fetchHFRates(),
    fetchDidimdolRates(),
    fetchMyHomeData(),
    fetchBuddyRates()
  ]);

  log('─────────────────────────────', 'info');

  const keys = Object.keys(fetchedRates);
  if (keys.length > 0) {
    log(`총 ${keys.length}개 항목 가져오기 성공!`, 'ok');
    showPreview();
  } else {
    log('가져온 데이터가 없습니다. CORS 프록시 제한일 수 있습니다.', 'warn');
    log('아래 수동 편집으로 직접 업데이트해주세요.', 'info');
  }

  btn.disabled = false;
  btn.innerHTML = '다시 가져오기';
}

function showPreview() {
  const card = document.getElementById('previewCard');
  const body = document.getElementById('previewBody');
  card.classList.add('show');

  const labels = {
    'didimdol.rateMin': '디딤돌 최저금리',
    'didimdol.rateMax': '디딤돌 최고금리',
    'bogeumjari.rateMin': '보금자리론 최저금리',
    'bogeumjari.rateMax': '보금자리론 최고금리',
    'baby.purchase.rateMin': '신생아특례 구입 최저금리',
    'baby.purchase.rateMax': '신생아특례 구입 최고금리',
    'buteommok.types.general.rateMin': '버팀목 일반 최저금리',
    'buteommok.types.general.rateMax': '버팀목 일반 최고금리'
  };

  let html = '';
  for (const [path, newVal] of Object.entries(fetchedRates)) {
    const oldVal = getNestedValue(currentData, path);
    const label = labels[path] || path;
    const changed = oldVal !== newVal;

    html += `<div class="preview-row">
      <span>${label}</span>
      <span>${changed
        ? `<span class="preview-old">${oldVal}%</span> → <span class="preview-new">${newVal}%</span>`
        : `<span class="preview-same">${oldVal}% (변동없음)</span>`
      }</span>
    </div>`;
  }

  body.innerHTML = html;
  card.scrollIntoView({ behavior: 'smooth' });
}

async function applyAndSave() {
  const btn = document.getElementById('applyBtn');
  btn.disabled = true;
  btn.textContent = '저장 중...';

  try {
    // 가져온 데이터 적용
    for (const [path, val] of Object.entries(fetchedRates)) {
      setNestedValue(currentData, path, val);
    }

    // 타임스탬프 업데이트
    currentData.lastUpdated = new Date().toISOString().split('T')[0];

    // GitHub에 저장
    const saveData = JSON.parse(JSON.stringify(currentData));
    delete saveData._sha;
    const content = JSON.stringify(saveData, null, 2);

    await ghPut(DATA_PATH, content,
      `자동 업데이트: ${currentData.lastUpdated} (금리 갱신)`,
      currentData._sha
    );

    // SHA 갱신
    const file = await ghGet(DATA_PATH);
    currentData._sha = file.sha;
    originalData = JSON.parse(JSON.stringify(saveData));

    // 폼 갱신
    populateForm();
    document.querySelectorAll('.form-input.changed').forEach(i => i.classList.remove('changed'));
    updateChangeCount();

    document.getElementById('lastUpdated').textContent = '최종: ' + currentData.lastUpdated;
    document.getElementById('previewCard').classList.remove('show');

    showToast('자동 업데이트 완료! GitHub에 저장되었습니다.', 'success');
    log('GitHub 저장 완료!', 'ok');
  } catch (e) {
    showToast('저장 실패: ' + e.message, 'error');
    log('저장 실패: ' + e.message, 'err');
  } finally {
    btn.disabled = false;
    btn.textContent = '변경사항 적용 + GitHub 저장';
  }
}
