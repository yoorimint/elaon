<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 - eloan.kr</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --primary: #1B65E3;
  --primary-dark: #0F4ABF;
  --primary-light: #E8F0FE;
  --accent: #00C48C;
  --danger: #EF4444;
  --warning: #F59E0B;
  --bg: #F5F6FA;
  --card: #FFFFFF;
  --text: #1A1D26;
  --text-sub: #6B7280;
  --text-light: #9CA3AF;
  --border: #E5E7EB;
  --shadow: 0 2px 12px rgba(27,101,227,0.08);
  --radius: 16px;
  --radius-sm: 10px;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Noto Sans KR',-apple-system,sans-serif; background:var(--bg); color:var(--text); line-height:1.6; }
.container { max-width:640px; margin:0 auto; padding:0 20px; }

/* Login */
.login-wrap {
  min-height:100vh; display:flex; align-items:center; justify-content:center;
}
.login-card {
  background:var(--card); border-radius:var(--radius); padding:40px 32px;
  box-shadow:var(--shadow); width:100%; max-width:400px; text-align:center;
}
.login-card h1 { font-size:22px; font-weight:800; margin-bottom:8px; }
.login-card p { font-size:13px; color:var(--text-sub); margin-bottom:24px; }
.login-input {
  width:100%; height:48px; border:1.5px solid var(--border); border-radius:var(--radius-sm);
  padding:0 16px; font-size:15px; font-family:inherit; margin-bottom:12px;
  transition:border-color 0.2s;
}
.login-input:focus { outline:none; border-color:var(--primary); }
.login-btn {
  width:100%; height:48px; border:none; border-radius:var(--radius-sm);
  background:var(--primary); color:#fff; font-size:15px; font-weight:700;
  font-family:inherit; cursor:pointer; transition:background 0.2s;
}
.login-btn:hover { background:var(--primary-dark); }
.login-error { color:var(--danger); font-size:13px; margin-top:8px; display:none; }

/* Header */
.header {
  background:var(--primary); padding:16px 0; position:sticky; top:0; z-index:100;
}
.header-inner { display:flex; align-items:center; gap:12px; }
.header-title { color:#fff; font-size:17px; font-weight:700; }
.header-badge {
  margin-left:auto; background:rgba(255,255,255,0.2); color:#fff;
  font-size:11px; font-weight:600; padding:3px 8px; border-radius:12px;
}
.logout-btn {
  background:rgba(255,255,255,0.2); border:none; color:#fff; font-size:12px;
  padding:6px 12px; border-radius:8px; cursor:pointer; font-family:inherit;
}

/* Admin Panel */
.admin-panel { display:none; }
.admin-panel.show { display:block; }

.section-header {
  display:flex; align-items:center; justify-content:space-between;
  padding:20px 0 12px;
}
.section-title { font-size:16px; font-weight:700; }
.section-badge {
  font-size:11px; font-weight:600; padding:3px 10px; border-radius:12px;
}

.card {
  background:var(--card); border-radius:var(--radius); padding:20px;
  box-shadow:var(--shadow); margin-bottom:14px;
}
.card-title {
  font-size:14px; font-weight:700; margin-bottom:14px;
  padding-bottom:10px; border-bottom:1px solid var(--border);
  display:flex; align-items:center; gap:8px;
}
.card-title .dot {
  width:8px; height:8px; border-radius:50%; flex-shrink:0;
}

.form-row {
  display:flex; gap:12px; margin-bottom:12px; align-items:flex-end;
}
.form-group { flex:1; }
.form-label {
  font-size:12px; font-weight:600; color:var(--text-sub);
  margin-bottom:4px; display:block;
}
.form-input {
  width:100%; height:40px; border:1.5px solid var(--border); border-radius:8px;
  padding:0 12px; font-size:14px; font-family:inherit; color:var(--text);
  background:#FAFBFC; transition:border-color 0.2s;
}
.form-input:focus { outline:none; border-color:var(--primary); background:#fff; }
.form-input.changed { border-color:var(--warning); background:#FFFBEB; }

/* Toast */
.toast {
  position:fixed; top:80px; left:50%; transform:translateX(-50%);
  background:var(--text); color:#fff; padding:12px 24px; border-radius:var(--radius-sm);
  font-size:14px; font-weight:600; z-index:300; display:none;
  box-shadow:0 8px 30px rgba(0,0,0,0.2);
}
.toast.show { display:block; animation:fadeUp 0.3s ease; }
.toast.success { background:var(--accent); }
.toast.error { background:var(--danger); }

/* Auto Update */
.auto-card {
  background:linear-gradient(135deg,#1B65E3 0%,#6366F1 100%);
  border-radius:var(--radius); padding:24px 20px; margin-bottom:20px; color:#fff;
}
.auto-card h2 { font-size:18px; font-weight:800; margin-bottom:6px; }
.auto-card p { font-size:13px; opacity:0.85; margin-bottom:16px; }
.auto-btn {
  width:100%; height:52px; border:none; border-radius:var(--radius-sm);
  background:#fff; color:var(--primary); font-size:16px; font-weight:800;
  font-family:inherit; cursor:pointer; transition:all 0.2s;
  letter-spacing:-0.3px;
}
.auto-btn:hover { background:#E8F0FE; }
.auto-btn:disabled { opacity:0.6; cursor:not-allowed; }
.auto-btn .spinner {
  display:inline-block; width:16px; height:16px; border:2px solid var(--primary-light);
  border-top-color:var(--primary); border-radius:50%; animation:spin 0.8s linear infinite;
  vertical-align:middle; margin-right:8px;
}
@keyframes spin { to { transform:rotate(360deg); } }

.auto-log {
  margin-top:14px; background:rgba(0,0,0,0.2); border-radius:var(--radius-sm);
  padding:14px; font-size:12px; max-height:300px; overflow-y:auto;
  display:none; line-height:1.8;
}
.auto-log.show { display:block; }
.auto-log .ok { color:#86EFAC; }
.auto-log .warn { color:#FCD34D; }
.auto-log .err { color:#FCA5A5; }
.auto-log .info { color:rgba(255,255,255,0.7); }

.preview-card {
  background:var(--card); border-radius:var(--radius); padding:20px;
  box-shadow:var(--shadow); margin-bottom:14px; display:none;
}
.preview-card.show { display:block; }
.preview-title {
  font-size:15px; font-weight:700; margin-bottom:14px;
  display:flex; align-items:center; gap:8px;
}
.preview-row {
  display:flex; justify-content:space-between; align-items:center;
  padding:8px 0; border-bottom:1px solid var(--border); font-size:13px;
}
.preview-row:last-child { border-bottom:none; }
.preview-old { color:var(--text-light); text-decoration:line-through; }
.preview-new { color:var(--accent); font-weight:700; }
.preview-same { color:var(--text-sub); }
.apply-btn {
  width:100%; height:48px; border:none; border-radius:var(--radius-sm);
  background:var(--accent); color:#fff; font-size:15px; font-weight:700;
  font-family:inherit; cursor:pointer; margin-top:14px; transition:background 0.2s;
}
.apply-btn:hover { background:#00A374; }
.apply-btn:disabled { background:var(--text-light); cursor:not-allowed; }
.settings-card {
  background:var(--primary-light); border-radius:var(--radius);
  padding:16px 20px; margin-bottom:14px;
}
.settings-title { font-size:13px; font-weight:700; color:var(--primary-dark); margin-bottom:8px; }
.settings-row { display:flex; gap:8px; margin-bottom:8px; }
.settings-input {
  flex:1; height:36px; border:1px solid var(--border); border-radius:6px;
  padding:0 10px; font-size:13px; font-family:inherit;
}

@keyframes fadeUp {
  from { opacity:0; transform:translate(-50%,10px); }
  to { opacity:1; transform:translate(-50%,0); }
}

/* Writer */
.writer-card {
  background:linear-gradient(135deg,#059669 0%,#10B981 100%);
  border-radius:var(--radius); padding:24px 20px; margin-bottom:20px; color:#fff;
}
.writer-card h2 { font-size:18px; font-weight:800; margin-bottom:6px; }
.writer-card p { font-size:13px; opacity:0.85; margin-bottom:16px; }
.writer-input {
  width:100%; height:48px; border:none; border-radius:var(--radius-sm);
  padding:0 16px; font-size:15px; font-family:inherit; margin-bottom:10px;
  background:rgba(255,255,255,0.95); color:var(--text);
}
.writer-input:focus { outline:2px solid rgba(255,255,255,0.5); }
.writer-input::placeholder { color:var(--text-light); }
.writer-btn {
  width:100%; height:52px; border:none; border-radius:var(--radius-sm);
  background:#fff; color:#059669; font-size:16px; font-weight:800;
  font-family:inherit; cursor:pointer; transition:all 0.2s;
}
.writer-btn:hover { background:#E6F9F1; }
.writer-btn:disabled { opacity:0.6; cursor:not-allowed; }
.writer-log {
  margin-top:14px; background:rgba(0,0,0,0.2); border-radius:var(--radius-sm);
  padding:14px; font-size:12px; max-height:400px; overflow-y:auto;
  display:none; line-height:1.8;
}
.writer-log.show { display:block; }
.writer-log .ok { color:#86EFAC; }
.writer-log .warn { color:#FCD34D; }
.writer-log .err { color:#FCA5A5; }
.writer-log .info { color:rgba(255,255,255,0.7); }
.writer-result {
  margin-top:14px; background:rgba(255,255,255,0.95); border-radius:var(--radius-sm);
  padding:16px; display:none; color:var(--text);
}
.writer-result.show { display:block; }
.writer-result h3 { font-size:15px; font-weight:700; margin-bottom:8px; }
.writer-result .meta { font-size:12px; color:var(--text-sub); margin-bottom:12px; }
.writer-result .tags { display:flex; flex-wrap:wrap; gap:4px; margin-bottom:12px; }
.writer-result .tag { font-size:11px; background:#E8F0FE; color:#1B65E3; padding:2px 8px; border-radius:3px; }
.writer-upload-btn {
  width:100%; height:44px; border:none; border-radius:8px;
  background:#059669; color:#fff; font-size:14px; font-weight:700;
  font-family:inherit; cursor:pointer;
}
.writer-upload-btn:hover { background:#047857; }
.writer-upload-btn:disabled { background:var(--text-light); cursor:not-allowed; }
.gemini-key-row {
  display:flex; gap:8px; margin-bottom:10px;
}
.gemini-key-input {
  flex:1; height:40px; border:none; border-radius:8px; padding:0 12px;
  font-size:13px; font-family:inherit; background:rgba(255,255,255,0.9); color:var(--text);
}
.gemini-key-input:focus { outline:2px solid rgba(255,255,255,0.5); }
.gemini-key-save {
  height:40px; border:none; border-radius:8px; padding:0 16px;
  background:rgba(255,255,255,0.3); color:#fff; font-size:13px; font-weight:600;
  font-family:inherit; cursor:pointer;
}
.gemini-key-save:hover { background:rgba(255,255,255,0.4); }
</style>
</head>
<body>

<!-- Login Screen -->
<div id="loginScreen" class="login-wrap">
  <div class="login-card">
    <h1>eloan.kr 관리자</h1>
    <p>정책대출 데이터를 업데이트합니다</p>
    <input type="text" class="login-input" id="adminId" placeholder="아이디" onkeydown="if(event.key==='Enter')document.getElementById('adminPw').focus()">
    <input type="password" class="login-input" id="adminPw" placeholder="비밀번호" onkeydown="if(event.key==='Enter')doLogin()">
    <input type="password" class="login-input" id="githubToken" placeholder="GitHub Personal Access Token" onkeydown="if(event.key==='Enter')doLogin()">
    <input type="text" class="login-input" id="githubRepo" placeholder="GitHub Repo (예: username/elaon)" value="yoorimint/elaon" onkeydown="if(event.key==='Enter')doLogin()">
    <button class="login-btn" onclick="doLogin()">로그인</button>
    <div class="login-error" id="loginError"></div>
    <p style="font-size:11px;color:var(--text-light);margin-top:16px;">GitHub Token은 repo 권한이 필요합니다.</p>
  </div>
</div>

<!-- Admin Panel -->
<div id="adminPanel" class="admin-panel">

  <header class="header">
    <div class="container header-inner">
      <span class="header-title">관리자 패널</span>
      <span class="header-badge" id="lastUpdated">-</span>
      <button class="logout-btn" onclick="doLogout()">로그아웃</button>
    </div>
  </header>

  <main class="container" style="padding:20px 20px 120px;">

    <!-- 글쓰기 -->
    <div class="writer-card">
      <h2>블로그 글쓰기</h2>
      <p>공공서비스 API에서 데이터를 가져와 Gemini가 SEO 최적화 글을 작성합니다</p>
      <div class="gemini-key-row">
        <input type="password" class="gemini-key-input" id="geminiKey" placeholder="Gemini API Key">
        <button class="gemini-key-save" onclick="saveGeminiKey()">저장</button>
        <button class="gemini-key-save" onclick="testGeminiKey()" style="background:rgba(255,255,255,0.15);">테스트</button>
      </div>
      <div class="gemini-key-row">
        <input type="password" class="gemini-key-input" id="govApiKey" placeholder="정부24 API Key">
        <button class="gemini-key-save" onclick="saveGovKey()">저장</button>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:10px;">
        <select class="writer-input" id="writerCat" style="flex:1;height:44px;">
          <option value="지원금">지원금</option>
          <option value="절약">절약</option>
          <option value="재테크">재테크</option>
        </select>
        <button class="writer-btn" onclick="autoTopic()" style="flex:1;height:44px;font-size:13px;">주제 자동 추천</button>
      </div>
      <button class="writer-btn" id="fetchSvcBtn" onclick="fetchServices()" style="margin-bottom:10px;background:rgba(255,255,255,0.15);color:#fff;border:2px solid rgba(255,255,255,0.3);font-size:13px;height:40px;">공공서비스에서 가져오기</button>
      <div id="svcList" style="display:none;max-height:300px;overflow-y:auto;margin-bottom:10px;border-radius:10px;"></div>
      <input type="text" class="writer-input" id="writerKeyword" placeholder="키워드 직접 입력 또는 자동 추천 사용" onkeydown="if(event.key==='Enter')generatePost()">
      <button class="writer-btn" id="writerBtn" onclick="generatePost()">글 생성하기</button>
      <div class="writer-log" id="writerLog"></div>
      <div class="writer-result" id="writerResult">
        <h3 id="writerTitle"></h3>
        <div class="meta" id="writerMeta"></div>
        <div class="tags" id="writerTags"></div>
        <button class="writer-upload-btn" id="writerUploadBtn" onclick="uploadPost()">GitHub에 발행하기</button>
      </div>
    </div>

    <!-- 자동 작성 설정 -->
    <div class="settings-card" style="margin-bottom:14px;background:#F0EAFF;">
      <div class="settings-title" style="color:#7C3AED;">자동 작성 설정</div>
      <div style="display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap;">
        <label style="font-size:12px;color:#4B5563;display:flex;align-items:center;gap:4px;">
          <input type="checkbox" id="autoEnabled"> 자동 작성 활성화
        </label>
      </div>
      <div style="display:flex;gap:8px;margin-bottom:8px;">
        <div style="flex:1;">
          <div style="font-size:11px;color:#6B7280;margin-bottom:2px;">작성 시간</div>
          <input type="time" id="autoTime" value="09:00" style="width:100%;height:34px;border:1px solid #D1D5DB;border-radius:6px;padding:0 8px;font-size:13px;font-family:inherit;">
        </div>
        <div style="flex:1;">
          <div style="font-size:11px;color:#6B7280;margin-bottom:2px;">일일 작성 수</div>
          <select id="autoCount" style="width:100%;height:34px;border:1px solid #D1D5DB;border-radius:6px;padding:0 8px;font-size:13px;font-family:inherit;">
            <option value="1">1개</option>
            <option value="2">2개</option>
            <option value="3" selected>3개</option>
            <option value="5">5개</option>
          </select>
        </div>
      </div>
      <div style="display:flex;gap:6px;margin-bottom:8px;">
        <label style="font-size:12px;display:flex;align-items:center;gap:3px;"><input type="checkbox" id="autoCat1" checked> 지원금</label>
        <label style="font-size:12px;display:flex;align-items:center;gap:3px;"><input type="checkbox" id="autoCat2" checked> 절약</label>
        <label style="font-size:12px;display:flex;align-items:center;gap:3px;"><input type="checkbox" id="autoCat3" checked> 재테크</label>
      </div>
      <button onclick="saveAutoSettings()" style="width:100%;height:36px;border:none;border-radius:6px;background:#7C3AED;color:#fff;font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;">설정 저장</button>
      <div id="autoStatus" style="font-size:11px;color:#6B7280;margin-top:6px;"></div>
    </div>

    <!-- 발행된 글 목록 -->
    <div class="settings-card" style="margin-bottom:20px;">
      <div class="settings-title">발행된 글 (<span id="postCount">0</span>건)</div>
      <div id="postList" style="font-size:12px;color:var(--text-sub);max-height:200px;overflow-y:auto;">로딩 중...</div>
    </div>

  </main>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
/* ── Config ── */
const ADMIN_CRED_KEY = 'eloan_admin_cred_hash';
const GH_TOKEN_KEY = 'eloan_gh_token';
const GH_REPO_KEY = 'eloan_gh_repo';
const GEMINI_KEY_KEY = 'eloan_gemini_key';
const GOV_KEY_KEY = 'eloan_gov_api_key';
const BLOG_DIR = 'blog';
const SITE_URL = 'https://eloan.kr';
const SITE_NAME = '공공서비스 가이드 | eloan.kr';

let generatedArticle = null;
let existingPosts = [];
let selectedService = null;
let totalTokens = { input: 0, output: 0 };

// Gemini 2.5 Flash 가격 (USD per 1M tokens)
const GEMINI_PRICE = { input: 0.15, output: 0.60 };
const USD_TO_KRW = 1400;

function calcCostKRW(input, output) {
  const usd = (input / 1e6) * GEMINI_PRICE.input + (output / 1e6) * GEMINI_PRICE.output;
  return Math.round(usd * USD_TO_KRW * 100) / 100;
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + (type || '');
  setTimeout(() => t.className = 'toast', 3000);
}

/* ── Login ── */
async function hashStr(str) {
  const data = new TextEncoder().encode(str + 'eloan_salt_2026');
  const hash = await crypto.subtle.digest('SHA-256', data);
  return Array.from(new Uint8Array(hash)).map(b => b.toString(16).padStart(2,'0')).join('');
}

async function doLogin() {
  const id = document.getElementById('adminId').value;
  const pw = document.getElementById('adminPw').value;
  const token = document.getElementById('githubToken').value;
  const repo = document.getElementById('githubRepo').value;
  const errEl = document.getElementById('loginError');

  if (!id || !pw) {
    errEl.style.display = 'block';
    errEl.textContent = '아이디와 비밀번호를 입력해주세요';
    return;
  }
  if (!token) {
    errEl.style.display = 'block';
    errEl.textContent = 'GitHub Token을 입력해주세요';
    return;
  }

  const credHash = await hashStr(id + ':' + pw);
  const stored = localStorage.getItem(ADMIN_CRED_KEY);

  if (!stored) {
    localStorage.setItem(ADMIN_CRED_KEY, credHash);
    showToast('관리자 계정이 설정되었습니다', 'success');
  } else if (stored !== credHash) {
    errEl.style.display = 'block';
    errEl.textContent = '아이디 또는 비밀번호가 틀렸습니다';
    return;
  }

  localStorage.setItem(GH_TOKEN_KEY, token);
  localStorage.setItem(GH_REPO_KEY, repo);

  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('adminPanel').classList.add('show');
  loadExistingPosts();
  loadAutoSettings();
}

function doLogout() {
  localStorage.removeItem(GH_TOKEN_KEY);
  document.getElementById('adminPanel').classList.remove('show');
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('adminId').value = '';
  document.getElementById('adminPw').value = '';
  document.getElementById('githubToken').value = '';
}

/* ── GitHub API ── */
async function ghGet(path) {
  const token = localStorage.getItem(GH_TOKEN_KEY);
  const repo = localStorage.getItem(GH_REPO_KEY);
  const resp = await fetch(`https://api.github.com/repos/${repo}/contents/${path}`, {
    headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
  });
  if (!resp.ok) throw new Error(`GitHub GET failed: ${resp.status}`);
  return resp.json();
}

/* ── Load Existing Posts (중복 체크용) ── */
async function loadExistingPosts() {
  try {
    const token = localStorage.getItem(GH_TOKEN_KEY);
    const repo = localStorage.getItem(GH_REPO_KEY);
    const resp = await fetch(`https://api.github.com/repos/${repo}/contents/${BLOG_DIR}/posts.json`, {
      headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
    });
    if (resp.ok) {
      const data = await resp.json();
      existingPosts = JSON.parse(decodeURIComponent(escape(atob(data.content.replace(/\n/g, '')))));
    }
  } catch(e) { existingPosts = []; }

  document.getElementById('postCount').textContent = existingPosts.length;
  document.getElementById('lastUpdated').textContent = existingPosts.length + '건 발행됨';

  const listEl = document.getElementById('postList');

    listEl.textContent = '발행된 글이 없습니다.';

    listEl.innerHTML = existingPosts.map((p, i) =>
      `<div style="padding:6px 0;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:8px;">
        <span style="flex:1;">${p.date_iso || ''} · ${p.title}</span>
        <button onclick="deletePost(${i})" style="background:var(--danger);color:#fff;border:none;border-radius:4px;padding:2px 8px;font-size:11px;cursor:pointer;flex-shrink:0;">삭제</button>
      </div>`
    ).join('');

}

async function deletePost(idx) {
  const post = existingPosts[idx];
  if (!post) return;
  if (!confirm(`"${post.title}" 글을 삭제하시겠습니까?`)) return;

  const token = localStorage.getItem(GH_TOKEN_KEY);
  const repo = localStorage.getItem(GH_REPO_KEY);

  try {
    showToast('삭제 중...', '');

    // 1. 글 HTML 삭제
    const filePath = `${BLOG_DIR}/${post.slug}.html`;
    try {
      const fileResp = await fetch(`https://api.github.com/repos/${repo}/contents/${filePath}`, {
        headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
      });
      if (fileResp.ok) {
        const fileData = await fileResp.json();
        await fetch(`https://api.github.com/repos/${repo}/contents/${filePath}`, {
          method: 'DELETE',
          headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: `글 삭제: ${post.title}`, sha: fileData.sha, branch: 'main' })
        });
      }
    } catch(e) {}

    // 2. posts.json 업데이트
    const pResp = await fetch(`https://api.github.com/repos/${repo}/contents/${BLOG_DIR}/posts.json`, {
      headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
    });
    if (pResp.ok) {
      const pData = await pResp.json();
      const posts = JSON.parse(decodeURIComponent(escape(atob(pData.content.replace(/\n/g, '')))));
      const updated = posts.filter(p => p.slug !== post.slug);
      await fetch(`https://api.github.com/repos/${repo}/contents/${BLOG_DIR}/posts.json`, {
        method: 'PUT',
        headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message: `글 목록에서 삭제: ${post.title}`,
          content: btoa(unescape(encodeURIComponent(JSON.stringify(updated, null, 2)))),
          sha: pData.sha, branch: 'main'
        })
      });
    }

    showToast('삭제 완료!', 'success');
    await loadExistingPosts();
  } catch(e) {
    showToast('삭제 실패: ' + e.message, 'error');
  }
}

function isAlreadyWritten(serviceName) {
  var year = new Date().getFullYear();
  return existingPosts.some(function(p) {
    var sameService = p.keyword && (p.keyword.includes(serviceName) || serviceName.includes(p.keyword));
    var sameYear = p.title && p.title.includes(String(year));
    return sameService && sameYear;
  });
}

function scheduleAutoWrite() {
  var s = JSON.parse(localStorage.getItem('eloan_auto') || 'null');
  if (!s || !s.enabled || !s.cats.length) return;

  function checkAndRun() {
    var now = new Date();
    var hhmm = String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
    var todayKey = 'eloan_auto_ran_' + now.toISOString().slice(0,10);
    if (hhmm === s.time && !sessionStorage.getItem(todayKey)) {
      sessionStorage.setItem(todayKey, '1');
      runAutoWrite(s);
    }
  }
  setInterval(checkAndRun, 60000);
}

const HOT_KEYWORDS = [
  '대출','전세','청년','신생아','주거','월세','보조금','지원금','장려금',
  '육아','출산','양육','보육','학자금','장학','취업','창업','소상공인',
  '기초','연금','의료','건강보험','실업','고용','근로','임대','주택',
  '교육','돌봄','급여','수당','감면','면제','무료','할인','바우처',
  '저소득','한부모','다자녀','장애','노인','어르신','국민취업','자녀'
];

function scoreService(svc) {
  const text = `${svc['서비스명']||''} ${svc['서비스목적요약']||''} ${svc['지원대상']||''}`;
  let score = 0;
  for (const kw of HOT_KEYWORDS) {
    if (text.includes(kw)) score += 2;
  }
  // 지원대상이 넓을수록 관심도 높음
  const target = svc['지원대상'] || '';
  if (target.includes('국민') || target.includes('누구나')) score += 3;
  if (target.includes('청년') || target.includes('신혼')) score += 2;
  return score;
}

async function fetchServices() {
  const govKey = localStorage.getItem(GOV_KEY_KEY);
  if (!govKey) { showToast('정부24 API Key를 먼저 입력하세요', 'error'); return; }


  const btn = document.getElementById('fetchSvcBtn');
  btn.disabled = true;
  btn.textContent = '불러오는 중...';

  try {
    var allServices = [];
    for (var pg = 1; pg <= 5; pg++) {
      var resp = await fetch('https://api.odcloud.kr/api/gov24/v3/serviceList?serviceKey=' + govKey + '&page=' + pg + '&perPage=100&returnType=JSON');
      if (!resp.ok) break;
      var data = await resp.json();
      var items = data.data || [];
      allServices = allServices.concat(items);
      if (items.length < 100) break;
    }

    // 지원금/보조금 관련만 필터
    const supportOnly = allServices.filter(function(s) {
      var name = s['서비스명'] || '';
      return name.includes('지원') || name.includes('장려') || name.includes('수당') || name.includes('급여') || name.includes('보조금') || name.includes('바우처') || name.includes('대출') || name.includes('장학') || name.includes('연금');
    });

    // 인기순 정렬
    const scored = supportOnly.map(s => ({ ...s, _score: scoreService(s) }));
    scored.sort((a, b) => b._score - a._score);
    const services = scored.slice(0, 50);

    renderServiceList(services);
    writerLog('전체 ' + allServices.length + '건 중 지원금 ' + supportOnly.length + '건 → 인기순 ' + services.length + '건 표시', 'info');
  } catch(e) {
    showToast('서비스 목록 로드 실패: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = '공공서비스 불러오기';
  }
}

/* ── Writer: Gemini API ── */
async function callGemini(prompt, retries = 5) {
  const key = localStorage.getItem(GEMINI_KEY_KEY);
  if (!key) throw new Error('Gemini API Key를 먼저 입력하세요');

  // 테스트에서 확인된 모델 우선 사용
  const savedModel = localStorage.getItem('eloan_gemini_model');
  const attempts = [];
  if (savedModel) attempts.push({ ver: 'v1beta', model: savedModel });
  attempts.push(
    { ver: 'v1beta', model: 'gemini-2.5-flash' },
    { ver: 'v1beta', model: 'gemini-2.0-flash' },
    { ver: 'v1beta', model: 'gemini-1.5-flash-latest' },
    { ver: 'v1beta', model: 'gemini-pro' },
  );
  for (let i = 0; i < attempts.length; i++) {
    const { ver, model } = attempts[i];
    writerLog(`시도 ${i+1}/${attempts.length}: ${model} (${ver})...`, 'info');
    const resp = await fetch(`https://generativelanguage.googleapis.com/${ver}/models/${model}:generateContent?key=${key}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: [{ text: prompt }] }],
        generationConfig: { temperature: 0.8, topP: 0.95, maxOutputTokens: 8192 }
      })
    });
    if (resp.status === 429) {
      const errBody = await resp.text().catch(() => '');
      writerLog(`${model} 429 할당량 초과, 다음 모델 시도...`, 'warn');
      await new Promise(r => setTimeout(r, 3000));
      continue;
    }
    if (resp.status === 404) {
      writerLog(`${model} (${ver}) 404 - 모델 없음, 다음 시도...`, 'warn');
      continue;
    }
    if (!resp.ok) {
      const errBody = await resp.text().catch(() => '');
      writerLog(`${model} ${resp.status} 실패, 다음 시도...`, 'warn');
      continue;
    }
    const data = await resp.json();
    if (!data.candidates || !data.candidates[0]) {
      writerLog(`${model} 빈 응답, 다음 시도...`, 'warn');
      continue;
    }
    const usage = data.usageMetadata || {};
    const inTok = usage.promptTokenCount || 0;
    const outTok = usage.candidatesTokenCount || 0;
    totalTokens.input += inTok;
    totalTokens.output += outTok;
    const cost = calcCostKRW(inTok, outTok);
    writerLog(`${model} 성공! (입력:${inTok} 출력:${outTok} 토큰 / ${cost}원)`, 'ok');
    return data.candidates[0].content.parts[0].text;
  }
  throw new Error('모든 모델 시도 실패 - Google AI Studio에서 API Key를 새 프로젝트로 재발급하세요');
}

function cleanHtml(text) {
  return text.replace(/```html\s*/g, '').replace(/```\s*/g, '')
    .replace(/===JSON_START===[\s\S]*?===JSON_END===/g, '')
    .replace(/===HTML_START===/g, '').replace(/===HTML_END===/g, '')
    .trim();
}

}

14. 재테크/투자 관련 주제는 정부 제도가 아닌 실제 시장 정보를 다뤄라. 없는 정부 프로그램으로 포장하지 말 것.`;

    const fullResp = await callGemini(fullPrompt);

    // 파싱
    let title, metaDesc, tags, finalContent;
    try {
      const jsonMatch = fullResp.match(/===JSON_START===([\s\S]*?)===JSON_END===/);
      const htmlMatch = fullResp.match(/===HTML_START===([\s\S]*?)===HTML_END===/);

      if (jsonMatch) {
        const meta = JSON.parse(jsonMatch[1].trim());
        title = meta.title || `${year} ${keyword} 조건 신청방법 총정리`;
        metaDesc = meta.meta_description || keyword;
        tags = meta.tags || [];
      } else {
        // 구분자 없으면 JSON 부분 추출 시도
        const jsonPart = fullResp.match(/\{[\s\S]*?"title"[\s\S]*?\}/);
        if (jsonPart) {
          const meta = JSON.parse(jsonPart[0]);
          title = meta.title; metaDesc = meta.meta_description; tags = meta.tags || [];
        } else {
          title = `${year} ${keyword} 조건 신청방법 총정리`;
          metaDesc = keyword; tags = [keyword];
        }
      }

      finalContent = htmlMatch ? cleanHtml(htmlMatch[1]) : cleanHtml(fullResp.replace(/===JSON_START===[\s\S]*?===JSON_END===/, ''));
    } catch(e) {
      title = `${year} ${keyword} 조건 신청방법 총정리`;
      metaDesc = keyword; tags = [keyword];
      finalContent = cleanHtml(fullResp);
    }

    writerLog(`제목: ${title}`, 'ok');
    writerLog(`본문: ${finalContent.length}자`, 'ok');

    const totalCost = calcCostKRW(totalTokens.input, totalTokens.output);
    generatedArticle = { title, content: finalContent, meta_description: metaDesc, tags, keyword, tokens: { ...totalTokens }, cost: totalCost };
    writerLog(`완료! "${title}" (${finalContent.length}자)`, 'ok');
    writerLog(`총 토큰: 입력 ${totalTokens.input.toLocaleString()} + 출력 ${totalTokens.output.toLocaleString()} = ${(totalTokens.input+totalTokens.output).toLocaleString()} 토큰`, 'info');
    writerLog(`비용: 약 ${totalCost}원 (₩${USD_TO_KRW}/$ 기준)`, 'info');

    document.getElementById('writerTitle').textContent = title;
    document.getElementById('writerMeta').textContent = `${metaDesc}`;
    document.getElementById('writerTags').innerHTML = tags.map(t => `<span class="tag">${t}</span>`).join('') + `<span class="tag" style="background:#FEF3C7;color:#92400E;">비용: ${totalCost}원</span>`;
    document.getElementById('writerResult').classList.add('show');

  } catch(e) {
    writerLog('오류: ' + e.message, 'err');
    showToast('글 생성 실패: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = '글 생성하기';
  }
}

async function uploadPost() {
  if (!generatedArticle) return;
  const btn = document.getElementById('writerUploadBtn');
  btn.disabled = true;
  btn.textContent = '발행 중...';

  try {
    const token = localStorage.getItem(GH_TOKEN_KEY);
    const repo = localStorage.getItem(GH_REPO_KEY);
    const slug = makeSlug(generatedArticle.title);
    const postHtml = buildPostHtml(generatedArticle);
    const now = new Date();
    const dateStr = `${now.getFullYear()}년 ${String(now.getMonth()+1).padStart(2,'0')}월 ${String(now.getDate()).padStart(2,'0')}일`;
    const dateIso = now.toISOString().slice(0,10);

    writerLog('GitHub에 글 업로드 중...', 'info');

    // 1. 글 HTML push
    const postPath = `${BLOG_DIR}/${slug}.html`;
    let sha = null;
    try {
      const existing = await fetch(`https://api.github.com/repos/${repo}/contents/${postPath}`, {
        headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
      });
      if (existing.ok) sha = (await existing.json()).sha;
    } catch(e) {}

    const putBody = {
      message: `글 추가: ${generatedArticle.title}`,
      content: btoa(unescape(encodeURIComponent(postHtml))),
      branch: 'main'
    };
    if (sha) putBody.sha = sha;

    const putResp = await fetch(`https://api.github.com/repos/${repo}/contents/${postPath}`, {
      method: 'PUT',
      headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify(putBody)
    });
    if (!putResp.ok) throw new Error('글 push 실패: ' + putResp.status);
    writerLog('글 HTML 업로드 완료', 'ok');

    // 2. posts.json 업데이트
    writerLog('posts.json 업데이트 중...', 'info');
    let posts = [];
    let postsSha = null;
    try {
      const pResp = await fetch(`https://api.github.com/repos/${repo}/contents/${BLOG_DIR}/posts.json`, {
        headers: { 'Authorization': `token ${token}`, 'Accept': 'application/vnd.github.v3+json' }
      });
      if (pResp.ok) {
        const pData = await pResp.json();
        postsSha = pData.sha;
        posts = JSON.parse(decodeURIComponent(escape(atob(pData.content.replace(/\n/g, '')))));
      }
    } catch(e) {}

    const newPost = {
      title: generatedArticle.title, slug, date: dateStr, date_iso: dateIso,
      meta_description: generatedArticle.meta_description,
      tags: generatedArticle.tags, keyword: generatedArticle.keyword,
      category: document.getElementById('writerCat').value || '지원금'
    };
    posts = posts.filter(p => p.slug !== slug);
    posts.unshift(newPost);

    const postsPut = {
      message: `글 목록 업데이트: ${generatedArticle.title}`,
      content: btoa(unescape(encodeURIComponent(JSON.stringify(posts, null, 2)))),
      branch: 'main'
    };
    if (postsSha) postsPut.sha = postsSha;

    await fetch(`https://api.github.com/repos/${repo}/contents/${BLOG_DIR}/posts.json`, {
      method: 'PUT',
      headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
      body: JSON.stringify(postsPut)
    });
    writerLog('posts.json 업데이트 완료', 'ok');

    const postUrl = `${SITE_URL}/${BLOG_DIR}/${slug}.html`;
    writerLog(`발행 완료! ${postUrl}`, 'ok');
    showToast('글이 발행되었습니다!', 'success');

    // 발행 후 목록 갱신
    existingPosts = posts;
    selectedService = null;
    document.getElementById('writerKeyword').value = '';
    loadExistingPosts();

  } catch(e) {
    writerLog('발행 실패: ' + e.message, 'err');
    showToast('발행 실패: ' + e.message, 'error');
  } finally {
    btn.disabled = false;
    btn.textContent = 'GitHub에 발행하기';
  }
}

/* ── Auto-login / Auto-fill ── */
window.addEventListener('DOMContentLoaded', () => {
  const token = localStorage.getItem(GH_TOKEN_KEY);
  const cred = localStorage.getItem(ADMIN_CRED_KEY);
  const gemKey = localStorage.getItem(GEMINI_KEY_KEY);
  const govKey = localStorage.getItem(GOV_KEY_KEY);

  // 로그인 유지: credential + token 둘 다 있으면 자동 로그인
  if (cred && token) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('adminPanel').classList.add('show');
    loadExistingPosts();
  } else if (token) {
    document.getElementById('githubToken').value = token;
    document.getElementById('githubRepo').value = localStorage.getItem(GH_REPO_KEY) || 'yoorimint/elaon';
  }

  if (gemKey) document.getElementById('geminiKey').value = gemKey;
  if (govKey) document.getElementById('govApiKey').value = govKey;
});
