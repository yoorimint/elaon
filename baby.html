<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>신생아특례대출 계산기 - eloan.kr</title>
    <link rel="stylesheet" href="/css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Noto Sans KR', sans-serif;
        }

        body {
            background-color: #f8f9fa;
            padding-bottom: 100px;
        }

        .page-header {
            background: white;
            padding: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-bottom: 1px solid #e9ecef;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .back-btn {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            padding: 4px 8px;
            color: #495057;
        }

        .header-title {
            flex: 1;
            font-size: 20px;
            font-weight: 600;
            color: #212529;
        }

        .badge {
            background: #e7f5ff;
            color: #1971c2;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="page-header">
        <button class="back-btn" onclick="window.location.href='/'">←</button>
        <h1 class="header-title">신생아특례대출 계산기</h1>
        <span class="badge">계산기</span>
    </div>
    <div style="text-align: center; padding: 40px 20px;">
        <h2>신생아특례대출 계산기</h2>
        <p>출산가구 주택대출을 쉽게 계산하세요.</p>
    </div>
</body>
</html>
