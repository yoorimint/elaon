<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>정책대출 종합안내 - 이로운</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .guide-container {
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }

        .info-card {
            background: #fff;
            border: 1px solid #eee;
            border-radius: 8px;
            padding: 20px;
            margin-bottom: 16px;
        }

        .info-card-title {
            font-size: 18px;
            font-weight: 700;
            color: #003399;
            margin-bottom: 16px;
            padding-bottom: 12px;
            border-bottom: 3px solid #003399;
        }

        .info-list {
            list-style: none;
            padding: 0;
        }

        .info-list-item {
            padding: 12px 0;
            border-bottom: 1px solid #f0f0f0;
            font-size: 15px;
            line-height: 1.6;
            color: #333;
        }

        .info-list-item:last-child {
            border-bottom: none;
        }

        .info-list-item strong {
            color: #003399;
        }

        .compare-table {
            width: 100%;
            border-collapse: collapse;
            margin: 16px 0;
            font-size: 14px;
        }

        .compare-table th {
            background: #f5f5f5;
            color: #222;
            padding: 12px;
            text-align: left;
            font-weight: 600;
            border: 1px solid #ddd;
        }

        .compare-table td {
            padding: 12px;
            border: 1px solid #ddd;
            color: #555;
        }

        .compare-table tr:nth-child(even) {
            background: #fafafa;
        }

        .compare-card {
            background: #f9f9f9;
            border: 1px solid #e0e0e0;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 12px;
        }

        .compare-card-title {
            font-weight: 600;
            color: #003399;
            margin-bottom: 8px;
        }

        .compare-card-desc {
            font-size: 14px;
            color: #666;
            line-height: 1.5;
        }

        .step-item {
            display: flex;
            margin-bottom: 16px;
            gap: 12px;
        }

        .step-number {
            width: 36px;
            height: 36px;
            background: #003399;
            color: #fff;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            flex-shrink: 0;
        }

        .step-content {
            flex: 1;
        }

        .step-title {
            font-weight: 600;
            color: #222;
            margin-bottom: 4px;
        }

        .step-desc {
            font-size: 14px;
            color: #666;
            line-height: 1.5;
        }

        details {
            margin-bottom: 12px;
            border: 1px solid #eee;
            border-radius: 6px;
            overflow: hidden;
        }

        summary {
            padding: 12px;
            background: #f9f9f9;
            cursor: pointer;
            font-weight: 600;
            color: #333;
            user-select: none;
        }

        summary:hover {
            background: #f0f0f0;
        }

        details[open] summary {
            background: #e8f0ff;
            color: #003399;
        }

        details[open] > :not(summary) {
            padding: 12px;
            background: #fff;
            border-top: 1px solid #eee;
        }

        .page-header {
            position: sticky;
            top: 0;
            background-color: #fff;
            border-bottom: 1px solid #eee;
            z-index: 100;
            margin-bottom: 16px;
        }

        .page-header-inner {
            display: flex;
            align-items: center;
            padding: 16px;
            position: relative;
        }

        .back-btn {
            width: 40px;
            height: 40px;
            border: none;
            background: none;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            color: #333;
            margin-right: 12px;
        }

        .page-title {
            font-size: 18px;
            font-weight: 600;
            color: #000;
            flex: 1;
        }

        .bottom-nav {
            display: flex;
            border-top: 1px solid #eee;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: #fff;
            z-index: 100;
        }

        .nav-item {
            flex: 1;
            padding: 12px;
            text-align: center;
            font-size: 12px;
            color: #666;
            cursor: pointer;
            transition: color 0.3s;
        }

        .nav-item.active {
            color: #003399;
            font-weight: 600;
        }

        body {
            padding-bottom: 70px;
        }

        .highlight {
            background: #fffacd;
            padding: 0 2px;
        }
    </style>
</head>
<body>

        <div class="page-header-inner">
            <button class="back-btn" onclick="window.location.href='/'">←</button>

        <div class="info-card">

            <ul class="info-list">

                </li>
                <li class="info-list-item">
                    <strong>특징:</strong> 시중 은행 대출보다 낮은 금리, 장기간 대출, 유연한 상환 조건 등이 특징입니다.
                </li>
                <li class="info-list-item">
                    <strong>제공 기관:</strong> 주택금융공사(HF), 국민은행, 신한은행 등 정책금융기관에서 제공합니다.
                </li>
                <li class="info-list-item">
                    <strong>대상:</strong> 일정 조건을 만족하는 무주택 세대주, 청년, 신혼부부 등 서민층이 주요 대상입니다.
                </li>
            </ul>
        </div>
    </div>

      </div>
    </nav>
</body>
