<html lang="ko">
<head>

<meta name="description" content="ChatGPT, Gemini, Claude 등 최신 AI 도구를 비교하고 리뷰합니다. 무료/유료 AI 툴 추천, 가격, 기능 비교.">
<meta property="og:title" content="AI 도구 리뷰 비교 - eloan.kr">
<meta property="og:description" content="최신 AI 도구 비교 리뷰, 추천, 가격 가이드">

<meta property="og:url" content="https://eloan.kr">

<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F8F9FB;--surface:#FFF;--text:#111827;--text-sub:#4B5563;--text-muted:#9CA3AF;
  --border:#E5E7EB;--border-light:#F3F4F6;
  --accent:#2563EB;--accent-bg:#EFF6FF;--accent-dark:#1D4ED8;
  --green:#059669;--green-bg:#ECFDF5;
  --purple:#7C3AED;--purple-bg:#F5F3FF;
  --orange:#EA580C;--orange-bg:#FFF7ED;
  --navy:#0F172A;--navy-light:#1E293B;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans KR','Inter',-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased;}
a{text-decoration:none;color:inherit;}

/* NAV */
.nav{background:var(--navy);position:sticky;top:0;z-index:100;}
.nav-inner{max-width:960px;margin:0 auto;padding:0 24px;height:52px;display:flex;align-items:center;justify-content:space-between;}
.nav-logo{color:#fff;font-size:18px;font-weight:800;letter-spacing:-0.5px;}
.nav-logo span{color:#60A5FA;font-weight:400;font-size:12px;margin-left:6px;letter-spacing:0;}
.nav-links{display:flex;gap:20px;}
.nav-links a{color:rgba(255,255,255,.65);font-size:13px;font-weight:500;transition:color .15s;}
.nav-links a:hover{color:#fff;}

/* HERO */
.hero{background:var(--navy);padding:40px 24px 56px;position:relative;}
.hero::after{content:'';position:absolute;bottom:0;left:0;right:0;height:24px;background:var(--bg);border-radius:24px 24px 0 0;}
.hero-inner{max-width:960px;margin:0 auto;text-align:center;}
.hero h1{color:#fff;font-size:28px;font-weight:800;letter-spacing:-0.5px;margin-bottom:8px;}
.hero-desc{color:rgba(255,255,255,.5);font-size:14px;margin-bottom:24px;}
.search-wrap{max-width:520px;margin:0 auto 20px;position:relative;}
.search-wrap input{width:100%;height:48px;border:none;border-radius:12px;padding:0 16px 0 44px;font-size:15px;font-family:inherit;background:rgba(255,255,255,.95);box-shadow:0 4px 20px rgba(0,0,0,.15);outline:none;transition:box-shadow .2s;}
.search-wrap input:focus{box-shadow:0 4px 20px rgba(37,99,235,.3);}
.search-wrap input::placeholder{color:var(--text-muted);}
.search-wrap svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted);}

/* CATEGORY PILLS */
.cat-row{display:flex;gap:8px;justify-content:center;flex-wrap:wrap;max-width:520px;margin:0 auto;}
.cat-pill{padding:7px 16px;border-radius:99px;border:1.5px solid rgba(255,255,255,.15);background:transparent;color:rgba(255,255,255,.7);font-size:13px;font-weight:500;font-family:inherit;cursor:pointer;transition:all .15s;}
.cat-pill:hover{border-color:rgba(255,255,255,.4);color:#fff;}
.cat-pill.active{background:#fff;color:var(--navy);border-color:#fff;font-weight:700;}

/* MAIN CONTENT */
.main{max-width:960px;margin:0 auto;padding:0 24px;}

/* FEATURED (카드 그리드) */
.section-bar{display:flex;align-items:center;justify-content:space-between;padding:28px 0 16px;}
.section-title{font-size:18px;font-weight:800;letter-spacing:-0.3px;}
.section-count{font-size:13px;color:var(--text-muted);}
.card-grid{display:grid;grid-template-columns:1fr;gap:14px;}
@media(min-width:640px){.card-grid{grid-template-columns:repeat(2,1fr);}}

.card{background:var(--surface);border-radius:14px;border:1px solid var(--border);overflow:hidden;transition:box-shadow .2s,transform .15s;display:flex;flex-direction:column;}
.card:hover{box-shadow:0 8px 30px rgba(0,0,0,.08);transform:translateY(-2px);}
.card-top{padding:20px 20px 0;flex:1;}
.card-cat{display:inline-block;font-size:11px;font-weight:600;padding:3px 8px;border-radius:4px;margin-bottom:10px;}
.card-cat.ai-chatbot{background:var(--accent-bg);color:var(--accent);}
.card-cat.image{background:var(--purple-bg);color:var(--purple);}
.card-cat.productivity{background:var(--green-bg);color:var(--green);}
.card-cat.dev{background:var(--orange-bg);color:var(--orange);}
.card-cat.compare{background:#FEF3C7;color:#B45309;}
.card-title{font-size:16px;font-weight:700;line-height:1.45;color:var(--text);margin-bottom:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.card-desc{font-size:13px;color:var(--text-sub);line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.card-bottom{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;border-top:1px solid var(--border-light);margin-top:16px;}
.card-date{font-size:12px;color:var(--text-muted);}
.card-tags{display:flex;gap:4px;}
.card-tag{font-size:11px;color:var(--text-muted);background:var(--border-light);padding:2px 7px;border-radius:3px;}
.card-arrow{width:28px;height:28px;border-radius:50%;background:var(--border-light);display:flex;align-items:center;justify-content:center;color:var(--text-muted);transition:all .15s;}
.card:hover .card-arrow{background:var(--accent);color:#fff;}

/* LIST VIEW */
.list-view{display:none;}
.list-item{display:flex;align-items:center;gap:14px;padding:16px 0;border-bottom:1px solid var(--border-light);}
.list-item:last-child{border-bottom:none;}
.list-num{width:28px;font-size:13px;font-weight:700;color:var(--text-muted);text-align:center;flex-shrink:0;}
.list-body{flex:1;min-width:0;}
.list-title{font-size:15px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.list-desc{font-size:12px;color:var(--text-sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
.list-right{flex-shrink:0;text-align:right;}
.list-date{font-size:12px;color:var(--text-muted);}
.list-cat{font-size:11px;font-weight:600;color:var(--accent);}

/* VIEW TOGGLE */
.view-toggle{display:flex;gap:4px;background:var(--border-light);border-radius:8px;padding:3px;}
.view-btn{width:32px;height:28px;border:none;border-radius:6px;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text-muted);transition:all .15s;}
.view-btn.active{background:var(--surface);color:var(--text);box-shadow:0 1px 3px rgba(0,0,0,.08);}

/* PAGINATION */
.paging{display:flex;justify-content:center;gap:4px;padding:28px 0;}
.pg-btn{width:36px;height:36px;border:1px solid var(--border);border-radius:8px;background:var(--surface);font-size:14px;font-family:inherit;color:var(--text-sub);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .15s;}
.pg-btn:hover{border-color:var(--accent);color:var(--accent);}
.pg-btn.active{background:var(--navy);color:#fff;border-color:var(--navy);}
.pg-btn:disabled{opacity:.3;cursor:default;}

/* FOOTER */
.footer-info{text-align:center;padding:16px 0 8px;font-size:12px;color:var(--text-muted);line-height:1.8;}
.footer{background:var(--navy);padding:28px 0;margin-top:32px;}
.footer-inner{max-width:960px;margin:0 auto;padding:0 24px;display:flex;justify-content:space-between;align-items:center;}
.footer p{font-size:12px;color:rgba(255,255,255,.4);}
.footer a{color:rgba(255,255,255,.6);}
.footer-links{display:flex;gap:16px;}
.footer-links a{color:rgba(255,255,255,.5);font-size:12px;transition:color .15s;}
.footer-links a:hover{color:rgba(255,255,255,.8);}

/* EMPTY */
.empty{text-align:center;padding:60px 0;color:var(--text-muted);}
.empty-icon{font-size:48px;margin-bottom:12px;opacity:.3;}
.empty-text{font-size:15px;}

/* RESPONSIVE */
@media(max-width:640px){
  .hero h1{font-size:22px;}
  .card-title{font-size:15px;}
  .footer-inner{flex-direction:column;gap:12px;text-align:center;}
}
</style>
</head>
<body>

<nav class="nav">
  <div class="nav-inner">
    <a href="/" class="nav-logo">eloan.kr<span>AI TOOL GUIDE</span></a>
    <div class="nav-links">
      <a href="/">리뷰</a>
      <a href="/admin.html">관리</a>
    </div>
  </div>
</nav>

<div class="hero">
  <div class="hero-inner">
    <h1>AI 도구 리뷰 & 비교 가이드</h1>
    <div class="hero-desc">ChatGPT, Gemini, Claude, Midjourney 등 최신 AI 도구를 직접 비교하고 리뷰합니다</div>
    <div class="search-wrap">
      <svg width="16" height="16" viewBox="0 0 18 18" fill="none"><circle cx="7.5" cy="7.5" r="5.5" stroke="currentColor" stroke-width="1.8"/><path d="M12 12l4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
      <input type="text" placeholder="AI 도구 검색 (예: ChatGPT, 이미지 생성, 코딩)" id="searchInput" oninput="doSearch()">
    </div>
    <div class="cat-row">
      <button class="cat-pill active" onclick="filterCat(this,'')">전체</button>
      <button class="cat-pill" onclick="filterCat(this,'AI챗봇')">AI 챗봇</button>
      <button class="cat-pill" onclick="filterCat(this,'이미지')">이미지/영상</button>
      <button class="cat-pill" onclick="filterCat(this,'생산성')">생산성</button>
      <button class="cat-pill" onclick="filterCat(this,'개발')">개발</button>
      <button class="cat-pill" onclick="filterCat(this,'비교')">비교/추천</button>
    </div>
  </div>
</div>

<div class="main">
  <div class="section-bar">
    <div class="section-title" id="sectionTitle">최신 리뷰</div>
    <div style="display:flex;align-items:center;gap:12px;">
      <div class="section-count" id="sectionCount"></div>
      <div class="view-toggle">
        <button class="view-btn active" id="gridViewBtn" onclick="setView('grid')" title="카드 뷰">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><rect x="1" y="1" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="9" y="1" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="1" y="9" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/><rect x="9" y="9" width="6" height="6" rx="1" stroke="currentColor" stroke-width="1.5"/></svg>
        </button>
        <button class="view-btn" id="listViewBtn" onclick="setView('list')" title="리스트 뷰">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none"><path d="M1 3h14M1 8h14M1 13h14" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"/></svg>
        </button>
      </div>
    </div>
  </div>

  <div class="card-grid" id="cardGrid"></div>
  <div class="list-view" id="listView"></div>
  <div class="paging" id="paging"></div>

  <div class="footer-info">
    AI 도구 정보는 수시로 변경됩니다. 최신 가격과 기능은 각 도구 공식 사이트에서 확인하세요.
  </div>
</div>

<footer class="footer">
  <div class="footer-inner">
    <p><a href="/"><strong>eloan.kr</strong></a> &copy; 2026 &middot; AI 도구 리뷰 가이드</p>
    <div class="footer-links">
      <a href="/">홈</a>
      <a href="/admin.html">관리자</a>
    </div>
  </div>
</footer>

<script>
var allPosts=[], filtered=[], page=1, PER=10, activeCat='', viewMode='grid';

var CAT_MAP = {
  'AI챗봇':['chatgpt','gpt','gemini','claude','챗봇','대화형','llm','ai채팅','copilot','perplexity'],
  '이미지':['이미지','영상','사진','그림','미드저니','midjourney','dall-e','stable diffusion','동영상','편집','생성'],
  '생산성':['생산성','자동화','노션','notion','업무','문서','요약','번역','메일','회의록','엑셀'],
  '개발':['개발','코딩','프로그래밍','vscode','cursor','github','api','배포','프레임워크','라이브러리'],
  '비교':['비교','추천','순위','top','best','무료','유료','가격','요금','플랜']
};

var CAT_CLASS = {'AI챗봇':'ai-chatbot','이미지':'image','생산성':'productivity','개발':'dev','비교':'compare'};

function matchCat(p, cat) {
  if (!cat) return true;
  if (p.category) return p.category === cat;
  var kws = CAT_MAP[cat] || [cat];
  var text = ((p.title||'')+' '+(p.meta_description||'')+' '+(p.tags||[]).join(' ')+' '+(p.keyword||'')).toLowerCase();
  return kws.some(function(k){return text.indexOf(k)!==-1;});
}

function getCatClass(p) {
  if (p.category && CAT_CLASS[p.category]) return CAT_CLASS[p.category];
  return 'ai-chatbot';
}

function getCatLabel(p) {
  if (p.category) return p.category;
  return 'AI 도구';
}

function loadPosts() {
  fetch('/blog/posts.json').then(function(r){
    if(!r.ok) throw 0; return r.json();
  }).then(function(data){
    allPosts=data; filtered=allPosts; render();
  }).catch(function(){
    document.getElementById('cardGrid').innerHTML='<div class="empty" style="grid-column:1/-1;"><div class="empty-icon">&#x1F50D;</div><div class="empty-text">아직 발행된 리뷰가 없습니다</div></div>';
  });
}

function applyFilters() {
  var q = (document.getElementById('searchInput').value||'').trim().toLowerCase();
  page = 1;
  filtered = allPosts.filter(function(p){
    if(!matchCat(p, activeCat)) return false;
    if(q){
      var text=((p.title||'')+' '+(p.meta_description||'')+' '+(p.tags||[]).join(' ')+' '+(p.keyword||'')).toLowerCase();
      if(text.indexOf(q)===-1) return false;
    }
    return true;
  });
  render();
}

function render() {
  var total=filtered.length;
  var pages=Math.ceil(total/PER)||1;
  if(page>pages) page=pages;
  var start=(page-1)*PER;
  var slice=filtered.slice(start,start+PER);

  document.getElementById('sectionCount').textContent=total+'건';
  document.getElementById('sectionTitle').textContent=activeCat?(activeCat+' 리뷰'):'최신 리뷰';

  // Card grid
  var grid=document.getElementById('cardGrid');
  var list=document.getElementById('listView');

  if(!total){
    var emptyHtml='<div class="empty" style="grid-column:1/-1;"><div class="empty-icon">&#x1F50D;</div><div class="empty-text">'+(allPosts.length?'해당 분야의 리뷰가 없습니다':'아직 발행된 리뷰가 없습니다')+'</div></div>';
    grid.innerHTML=emptyHtml;
    list.innerHTML=emptyHtml;
  } else {
    // Cards
    grid.innerHTML=slice.map(function(p){
      var date=(p.date_iso||'').replace(/-/g,'.');
      var catCls=getCatClass(p);
      var catLabel=getCatLabel(p);
      var tags=(p.tags||[]).slice(0,2);
      var tagsHtml=tags.map(function(t){return '<span class="card-tag">'+t+'</span>';}).join('');
      return '<a href="/blog/'+p.slug+'.html" class="card">'+
        '<div class="card-top">'+
        '<span class="card-cat '+catCls+'">'+catLabel+'</span>'+
        '<div class="card-title">'+p.title+'</div>'+
        '<div class="card-desc">'+(p.meta_description||'')+'</div>'+
        '</div>'+
        '<div class="card-bottom">'+
        '<div class="card-date">'+date+'</div>'+
        '<div class="card-tags">'+tagsHtml+'</div>'+
        '<div class="card-arrow"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M4.5 2.5l4 3.5-4 3.5" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>'+
        '</div></a>';
    }).join('');

    // List
    list.innerHTML=slice.map(function(p,i){
      var num=total-start-i;
      var date=(p.date_iso||'').replace(/-/g,'.');
      var catLabel=getCatLabel(p);
      return '<a href="/blog/'+p.slug+'.html" class="list-item">'+
        '<div class="list-num">'+num+'</div>'+
        '<div class="list-body"><div class="list-title">'+p.title+'</div>'+
        '<div class="list-desc">'+(p.meta_description||'')+'</div></div>'+
        '<div class="list-right"><div class="list-cat">'+catLabel+'</div><div class="list-date">'+date+'</div></div></a>';
    }).join('');
  }

  // Pagination
  var pg=document.getElementById('paging');
  if(pages<=1){pg.innerHTML='';return;}
  var html='<button class="pg-btn" onclick="goPage('+(page-1)+')"'+(page===1?' disabled':'')+'>&lsaquo;</button>';
  for(var i=1;i<=pages;i++){
    html+='<button class="pg-btn'+(i===page?' active':'')+'" onclick="goPage('+i+')">'+i+'</button>';
  }
  html+='<button class="pg-btn" onclick="goPage('+(page+1)+')"'+(page===pages?' disabled':'')+'>&rsaquo;</button>';
  pg.innerHTML=html;
}

function goPage(p){page=p;render();window.scrollTo({top:document.querySelector('.section-bar').offsetTop-60,behavior:'smooth'});}
function doSearch(){applyFilters();}
function filterCat(el,cat){
  activeCat=cat;
  document.querySelectorAll('.cat-pill').forEach(function(b){b.classList.remove('active');});
  el.classList.add('active');
  document.getElementById('searchInput').value='';
  applyFilters();
}
function setView(mode){
  viewMode=mode;
  document.getElementById('cardGrid').style.display=mode==='grid'?'grid':'none';
  document.getElementById('listView').style.display=mode==='list'?'block':'none';
  document.getElementById('gridViewBtn').classList.toggle('active',mode==='grid');
  document.getElementById('listViewBtn').classList.toggle('active',mode==='list');
}

loadPosts();
</script>
</body>
</html>
