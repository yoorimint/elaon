:root{--navy:#0D1B3E;--blue:#2563EB;--blue-light:#EFF6FF;--gold:#B8860B;--gold-light:#D4A933;--accent:#059669;--accent-light:#ECFDF5;--bg:#F7F8FA;--white:#FFF;--text:#1F2937;--text-sub:#4B5563;--text-muted:#9CA3AF;--border:#E5E7EB;}

body{font-family:'Noto Sans KR',-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;}

.tool-select,.tool-input{width:100%;height:42px;border:1.5px solid var(--border);border-radius:8px;padding:0 12px;font-size:14px;font-family:inherit;color:var(--text);background:var(--white);outline:none;}
.tool-select:focus,.tool-input:focus{border-color:var(--blue);}
.tool-btn{width:100%;height:48px;border:none;border-radius:10px;background:var(--accent);color:#fff;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:4px;transition:background .15s;}
.tool-btn:hover{background:#047857;}

/* 결과 */
.result-section{display:none;padding-top:20px;}
.result-section.show{display:block;}
.result-header{text-align:center;padding:16px 0;font-size:14px;color:var(--text-sub);}

.result-card{background:var(--white);border:1px solid var(--border);border-radius:10px;padding:14px 16px;margin-bottom:8px;cursor:pointer;transition:border-color .15s;}

.result-name{font-size:14px;font-weight:600;color:var(--navy);margin-bottom:2px;}
.result-desc{font-size:12px;color:var(--text-sub);}
.result-tags{display:flex;gap:4px;margin-top:6px;flex-wrap:wrap;}
.result-tag{font-size:10px;padding:2px 6px;border-radius:3px;background:var(--blue-light);color:var(--blue);font-weight:500;}
.result-tag.green{background:var(--accent-light);color:var(--accent);}
.result-empty{text-align:center;padding:30px;color:var(--text-muted);font-size:14px;}
.result-reset{display:block;margin:12px auto 0;background:none;border:1px solid var(--border);border-radius:8px;padding:8px 20px;font-size:13px;font-family:inherit;color:var(--text-sub);cursor:pointer;}

function findBenefits() {
  const age = parseInt(document.getElementById('toolAge').value) || 0;
  const family = document.getElementById('toolFamily').value;
  const income = parseInt(document.getElementById('toolIncome').value) || 0;
  const interest = document.getElementById('toolInterest').value;

  if (!age || !family || !income) {
    alert('나이, 가구 유형, 연소득을 모두 선택해주세요.');
    return;
  }

  const results = BENEFITS.filter(b => {
    if (age < b.age[0] || age > b.age[1]) return false;
    if (income > b.income) return false;
    if (!b.family.includes(family)) return false;
    if (interest && b.cat !== interest) return false;
    return true;
  });

  const sec = document.getElementById('resultSection');
  const header = document.getElementById('resultHeader');
  const list = document.getElementById('resultList');
  sec.classList.add('show');

  if (!results.length) {
    header.innerHTML = '조건에 맞는 지원금을 찾지 못했습니다.';
    list.innerHTML = '<div class="result-empty">관심 분야를 "전체"로 바꿔서 다시 검색해보세요.</div>';
  } else {
    header.innerHTML = '받을 수 있는 지원금 <strong>' + results.length + '건</strong>';
    list.innerHTML = results.map(function(b) {
      var slug = findPostSlug(b.name);
      var link = slug ? '/blog/' + slug + '.html' : '#';
      var tagHtml = b.tags.map(function(t){ return '<span class="result-tag">' + t + '</span>'; }).join('');
      return '<a href="' + link + '" class="result-card" style="display:block;text-decoration:none;color:inherit;">' +
        '<div class="result-name">' + b.name + '</div>' +
        '<div class="result-desc">' + b.desc + '</div>' +
        '<div class="result-tags"><span class="result-tag green">' + b.cat + '</span>' + tagHtml + '</div>' +
        '</a>';
    }).join('');
  }

  sec.scrollIntoView({behavior:'smooth'});
}

function findPostSlug(name) {
  var post = allPosts.find(function(p) {
    return (p.keyword && p.keyword.includes(name)) || (p.title && p.title.includes(name));
  });
  return post ? post.slug : '';
}

function resetTool() {
  document.getElementById('resultSection').classList.remove('show');
  document.getElementById('toolAge').value = '';
  document.getElementById('toolFamily').value = '';
  document.getElementById('toolIncome').value = '';
  document.getElementById('toolInterest').value = '';
}

/* ── 게시판 ── */
var allPosts = [], filtered = [], page = 1;
var PER = 10;

function loadPosts() {
  fetch('/blog/posts.json').then(function(r) {
    if (!r.ok) throw 0;
    return r.json();
  }).then(function(data) {
    allPosts = data;
    filtered = allPosts;
    render();
  }).catch(function() {
    document.getElementById('boardList').innerHTML = '<div class="empty">아직 발행된 글이 없습니다.</div>';
  });
}

function render() {
  var total = filtered.length;
  var pages = Math.ceil(total / PER) || 1;
  if (page > pages) page = pages;
  var start = (page - 1) * PER;
  var slice = filtered.slice(start, start + PER);

  document.getElementById('boardCount').textContent = total + '건';
  var list = document.getElementById('boardList');
  if (!total) { list.innerHTML = '<div class="empty">검색 결과가 없습니다.</div>'; }
  else {
    list.innerHTML = slice.map(function(p, i) {
      var num = total - start - i;
      var date = (p.date_iso || '').replace(/-/g, '.');
      return '<a href="/blog/' + p.slug + '.html" class="board-row">' +
        '<div class="board-num">' + num + '</div>' +
        '<div class="board-body"><div class="board-row-title">' + p.title + '</div>' +
        '<div class="board-row-desc">' + (p.meta_description || '') + '</div></div>' +
        '<div class="board-date">' + date + '</div></a>';
    }).join('');
  }

  var pg = document.getElementById('paging');
  if (pages <= 1) { pg.innerHTML = ''; return; }
  var html = '<button class="page-btn" onclick="goPage(' + (page-1) + ')"' + (page===1?' disabled':'') + '>&lt;</button>';
  for (var i = 1; i <= pages; i++) {
    html += '<button class="page-btn' + (i===page?' active':'') + '" onclick="goPage(' + i + ')">' + i + '</button>';
  }
  html += '<button class="page-btn" onclick="goPage(' + (page+1) + ')"' + (page===pages?' disabled':'') + '>&gt;</button>';
  pg.innerHTML = html;
}

function goPage(p) { page = p; render(); window.scrollTo({top:document.querySelector('.board').offsetTop - 20,behavior:'smooth'}); }

function doSearch() {
  var q = document.getElementById('searchInput').value.trim().toLowerCase();
  page = 1;
  if (!q) { filtered = allPosts; }
  else {
    filtered = allPosts.filter(function(p) {
      var t = (p.title||'') + ' ' + (p.meta_description||'') + ' ' + (p.tags||[]).join(' ') + ' ' + (p.keyword||'');
      return t.toLowerCase().indexOf(q) !== -1;
    });
  }
  render();
}

function trackVisitor() {
  var today = new Date().toISOString().slice(0,10);
  var s = JSON.parse(localStorage.getItem('eloan_v') || '{}');
  if (!s.t) s.t = 0; if (!s.d) s.d = ''; if (!s.c) s.c = 0;
  if (s.d !== today) { s.c = 0; s.d = today; }
  if (!sessionStorage.getItem('ev')) { s.t++; s.c++; sessionStorage.setItem('ev','1'); localStorage.setItem('eloan_v',JSON.stringify(s)); }
  document.getElementById('todayCount').textContent = s.c;
  document.getElementById('totalCount').textContent = s.t.toLocaleString();
}

loadPosts();
trackVisitor();
</script>
