<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>공공서비스 가이드 - 정부지원금·보조금·정책 총정리 | eloan.kr</title>
<meta name="description" content="2026년 최신 정부 지원금, 보조금, 공공서비스 자격조건과 신청방법을 총정리합니다.">
<meta property="og:title" content="공공서비스 가이드 - eloan.kr">
<meta property="og:description" content="정부 지원금·보조금·공공서비스 자격조건과 신청방법 총정리">
<meta property="og:type" content="website">
<meta property="og:url" content="https://eloan.kr">
<link rel="canonical" href="https://eloan.kr">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root{--navy:#0D1B3E;--blue:#2563EB;--blue-light:#EFF6FF;--gold:#B8860B;--gold-light:#D4A933;--bg:#F7F8FA;--white:#FFF;--text:#1F2937;--text-sub:#4B5563;--text-muted:#9CA3AF;--border:#E5E7EB;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans KR',-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;}

.topbar{background:var(--navy);padding:14px 0;border-bottom:2px solid var(--gold);}
.topbar-inner{max-width:640px;margin:0 auto;padding:0 20px;display:flex;justify-content:space-between;align-items:center;}
.topbar-logo{color:#fff;text-decoration:none;font-size:17px;font-weight:800;}
.topbar-logo span{color:var(--gold-light);font-weight:300;font-size:11px;margin-left:6px;}

.container{max-width:640px;margin:0 auto;padding:0 20px;}

.hero{background:var(--navy);padding:32px 20px 40px;text-align:center;position:relative;}
.hero::after{content:'';position:absolute;bottom:-14px;left:0;right:0;height:28px;background:var(--bg);border-radius:16px 16px 0 0;}
.hero h1{color:#fff;font-size:20px;font-weight:800;margin-bottom:12px;}
.search-box{max-width:440px;margin:0 auto;position:relative;}
.search-box input{width:100%;height:46px;border:none;border-radius:10px;padding:0 16px 0 42px;font-size:14px;font-family:inherit;outline:none;box-shadow:0 2px 12px rgba(0,0,0,0.12);}
.search-box input::placeholder{color:var(--text-muted);}
.search-box svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted);}

.board{padding-top:20px;}
.board-header{display:flex;justify-content:space-between;align-items:center;padding:0 2px 10px;border-bottom:2px solid var(--navy);}
.board-title{font-size:15px;font-weight:700;color:var(--navy);}
.board-count{font-size:12px;color:var(--text-muted);}

.board-row{display:flex;align-items:center;padding:14px 2px;border-bottom:1px solid var(--border);text-decoration:none;color:inherit;gap:10px;transition:background 0.1s;}
.board-row:hover{background:var(--blue-light);}
.board-num{width:28px;font-size:12px;font-weight:600;color:var(--text-muted);text-align:center;flex-shrink:0;}
.board-body{flex:1;min-width:0;}
.board-row-title{font-size:14px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.board-row-desc{font-size:11px;color:var(--text-sub);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-top:2px;}
.board-date{font-size:11px;color:var(--text-muted);flex-shrink:0;}

.paging{display:flex;justify-content:center;gap:4px;padding:20px 0;}
.page-btn{width:32px;height:32px;border:1px solid var(--border);border-radius:6px;background:var(--white);font-size:13px;font-family:inherit;color:var(--text-sub);cursor:pointer;display:flex;align-items:center;justify-content:center;}
.page-btn:hover{border-color:var(--blue);color:var(--blue);}
.page-btn.active{background:var(--navy);color:#fff;border-color:var(--navy);}
.page-btn:disabled{opacity:0.3;cursor:default;}

.empty{text-align:center;padding:40px 0;color:var(--text-muted);font-size:14px;}

.bottom-info{text-align:center;padding:20px 0;font-size:11px;color:var(--text-muted);line-height:1.8;}
.stats{display:flex;gap:20px;justify-content:center;margin-bottom:6px;}
.stat-num{font-weight:800;color:var(--navy);}

.footer{background:var(--navy);padding:20px 0;text-align:center;}
.footer p{font-size:11px;color:rgba(255,255,255,0.4);}
.footer a{color:rgba(255,255,255,0.6);text-decoration:none;}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <a href="/" class="topbar-logo">eloan.kr<span>공공서비스 가이드</span></a>
  </div>
</div>

<div class="hero">
  <h1>정부 지원금·보조금 가이드</h1>
  <div class="search-box">
    <svg width="16" height="16" viewBox="0 0 18 18" fill="none"><circle cx="7.5" cy="7.5" r="5.5" stroke="currentColor" stroke-width="1.8"/><path d="M12 12l4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
    <input type="text" placeholder="검색 (예: 청년 월세, 육아 수당)" id="searchInput" oninput="doSearch()">
  </div>
</div>

<div class="container">
  <div class="board">
    <div class="board-header">
      <div class="board-title">전체 글</div>
      <div class="board-count" id="boardCount"></div>
    </div>
    <div id="boardList"></div>
    <div class="paging" id="paging"></div>
  </div>

  <div class="bottom-info">
    <div class="stats">
      <span>오늘 <span class="stat-num" id="todayCount">-</span></span>
      <span>누적 <span class="stat-num" id="totalCount">-</span></span>
    </div>
    정부 공공데이터 기반 · 정확한 조건은 해당 기관에 확인하세요
  </div>
</div>

<footer class="footer">
  <p><a href="/"><strong>eloan.kr</strong></a> &copy; 2026</p>
</footer>

<script>
let allPosts = [], filtered = [], page = 1;
const PER = 10;

async function loadPosts() {
  try {
    const r = await fetch('/blog/posts.json');
    if (!r.ok) throw 0;
    allPosts = await r.json();
    filtered = allPosts;
    render();
  } catch(e) {
    document.getElementById('boardList').innerHTML = '<div class="empty">아직 발행된 글이 없습니다.</div>';
  }
}

function render() {
  const total = filtered.length;
  const pages = Math.ceil(total / PER) || 1;
  if (page > pages) page = pages;
  const start = (page - 1) * PER;
  const slice = filtered.slice(start, start + PER);

  document.getElementById('boardCount').textContent = total + '건';

  const list = document.getElementById('boardList');
  if (!total) { list.innerHTML = '<div class="empty">검색 결과가 없습니다.</div>'; }
  else {
    list.innerHTML = slice.map((p, i) => {
      const num = total - start - i;
      const date = (p.date_iso || '').replace(/-/g, '.');
      return `<a href="/blog/${p.slug}.html" class="board-row">
        <div class="board-num">${num}</div>
        <div class="board-body">
          <div class="board-row-title">${p.title}</div>
          <div class="board-row-desc">${p.meta_description || ''}</div>
        </div>
        <div class="board-date">${date}</div>
      </a>`;
    }).join('');
  }

  const pg = document.getElementById('paging');
  if (pages <= 1) { pg.innerHTML = ''; return; }
  let html = `<button class="page-btn" onclick="goPage(${page-1})" ${page===1?'disabled':''}>&lt;</button>`;
  for (let i = 1; i <= pages; i++) {
    html += `<button class="page-btn${i===page?' active':''}" onclick="goPage(${i})">${i}</button>`;
  }
  html += `<button class="page-btn" onclick="goPage(${page+1})" ${page===pages?'disabled':''}>&gt;</button>`;
  pg.innerHTML = html;
}

function goPage(p) { page = p; render(); window.scrollTo({top:0,behavior:'smooth'}); }

function doSearch() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  page = 1;
  if (!q) { filtered = allPosts; }
  else {
    filtered = allPosts.filter(p => {
      const t = `${p.title||''} ${p.meta_description||''} ${(p.tags||[]).join(' ')} ${p.keyword||''}`.toLowerCase();
      return t.includes(q);
    });
  }
  render();
}

function trackVisitor() {
  const today = new Date().toISOString().slice(0,10);
  const s = JSON.parse(localStorage.getItem('eloan_v') || '{}');
  if (!s.t) s.t = 0; if (!s.d) s.d = ''; if (!s.c) s.c = 0;
  if (s.d !== today) { s.c = 0; s.d = today; }
  if (!sessionStorage.getItem('ev')) { s.t++; s.c++; sessionStorage.setItem('ev','1'); localStorage.setItem('eloan_v',JSON.stringify(s)); }
  document.getElementById('todayCount').textContent = s.c;
  document.getElementById('totalCount').textContent = s.t.toLocaleString();
}

loadPosts();
trackVisitor();
</script>
</body>
</html>
