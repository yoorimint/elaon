<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>공공서비스 가이드 - 정부지원금·보조금·정책 총정리 | eloan.kr</title>
<meta name="description" content="2026년 최신 정부 지원금, 보조금, 공공서비스 자격조건과 신청방법을 총정리합니다.">
<meta property="og:title" content="공공서비스 가이드 - eloan.kr">
<meta property="og:description" content="정부 지원금·보조금·공공서비스 자격조건과 신청방법 총정리">
<meta property="og:type" content="website">
<meta property="og:url" content="https://eloan.kr">
<link rel="canonical" href="https://eloan.kr">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --navy:#0D1B3E; --blue:#2563EB; --blue-light:#EFF6FF;
  --gold:#B8860B; --gold-light:#D4A933;
  --bg:#F7F8FA; --white:#FFFFFF; --text:#1F2937;
  --text-sub:#4B5563; --text-muted:#9CA3AF;
  --border:#E5E7EB; --border-light:#F3F4F6;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Noto Sans KR',-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;-webkit-font-smoothing:antialiased;}

.topbar{background:var(--navy);padding:14px 0;border-bottom:2px solid var(--gold);}
.topbar-inner{max-width:680px;margin:0 auto;padding:0 20px;display:flex;justify-content:space-between;align-items:center;}
.topbar-logo{color:#fff;text-decoration:none;font-size:17px;font-weight:800;letter-spacing:0.5px;}
.topbar-logo span{color:var(--gold-light);font-weight:300;font-size:11px;margin-left:6px;}
.topbar-nav a{color:rgba(255,255,255,0.65);text-decoration:none;font-size:13px;margin-left:16px;}
.topbar-nav a:hover{color:#fff;}

.container{max-width:680px;margin:0 auto;padding:0 20px;}

/* Hero - 심플 */
.hero{background:var(--navy);padding:36px 20px 44px;text-align:center;position:relative;}
.hero::after{content:'';position:absolute;bottom:-16px;left:0;right:0;height:32px;background:var(--bg);border-radius:20px 20px 0 0;}
.hero h1{color:#fff;font-size:22px;font-weight:800;margin-bottom:14px;letter-spacing:-0.3px;}
.hero-search{max-width:440px;margin:0 auto;position:relative;}
.hero-search input{width:100%;height:48px;border:none;border-radius:12px;padding:0 16px 0 44px;font-size:14px;font-family:inherit;box-shadow:0 4px 16px rgba(0,0,0,0.15);outline:none;}
.hero-search input::placeholder{color:var(--text-muted);}
.hero-search svg{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-muted);}

/* 카테고리 탭 */
.cat-tabs{display:flex;gap:8px;overflow-x:auto;padding:20px 0 8px;-webkit-overflow-scrolling:touch;}
.cat-tab{flex-shrink:0;padding:8px 16px;border-radius:20px;border:1px solid var(--border);background:var(--white);font-size:13px;font-weight:500;color:var(--text-sub);cursor:pointer;font-family:inherit;transition:all 0.15s;}
.cat-tab:hover,.cat-tab.active{background:var(--navy);color:#fff;border-color:var(--navy);}

/* 글 카드 */
.post-card{display:block;background:var(--white);border:1px solid var(--border);border-radius:10px;padding:16px 18px;margin-bottom:10px;text-decoration:none;color:inherit;transition:border-color 0.15s;}
.post-card:hover{border-color:var(--blue);}
.post-date{font-size:11px;color:var(--text-muted);margin-bottom:3px;}
.post-title{font-size:15px;font-weight:600;color:var(--navy);line-height:1.4;margin-bottom:4px;letter-spacing:-0.2px;}
.post-desc{font-size:12px;color:var(--text-sub);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.post-cat{display:inline-block;font-size:10px;font-weight:600;color:var(--blue);background:var(--blue-light);padding:1px 6px;border-radius:3px;margin-top:6px;}

.empty{text-align:center;padding:40px 20px;color:var(--text-muted);font-size:14px;}

/* 하단 */
.bottom-info{text-align:center;padding:24px 20px;font-size:11px;color:var(--text-muted);line-height:1.8;}
.stats{display:flex;gap:24px;justify-content:center;padding:8px 0 16px;}
.stat{text-align:center;}
.stat-num{font-size:16px;font-weight:800;color:var(--navy);}
.stat-label{font-size:10px;color:var(--text-muted);}

.footer{background:var(--navy);padding:24px 0;text-align:center;}
.footer p{font-size:11px;color:rgba(255,255,255,0.4);line-height:1.8;}
.footer a{color:rgba(255,255,255,0.6);text-decoration:none;}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-inner">
    <a href="/" class="topbar-logo">eloan.kr<span>공공서비스 가이드</span></a>
    <nav class="topbar-nav">
      <a href="/">홈</a>
      <a href="/blog/">전체글</a>
    </nav>
  </div>
</div>

<div class="hero">
  <h1>정부 지원금·보조금 가이드</h1>
  <div class="hero-search">
    <svg width="16" height="16" viewBox="0 0 18 18" fill="none"><circle cx="7.5" cy="7.5" r="5.5" stroke="currentColor" stroke-width="1.8"/><path d="M12 12l4 4" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/></svg>
    <input type="text" placeholder="검색 (예: 청년 월세, 육아 수당)" id="searchInput" onkeyup="handleSearch(event)">
  </div>
</div>

<div class="container">

  <!-- 카테고리 탭 + 글 목록 통합 -->
  <div class="cat-tabs" id="catTabs">
    <button class="cat-tab active" onclick="filterCat('전체')">전체</button>
    <button class="cat-tab" onclick="filterCat('주거')">주거·대출</button>
    <button class="cat-tab" onclick="filterCat('청년')">청년</button>
    <button class="cat-tab" onclick="filterCat('육아')">육아·출산</button>
    <button class="cat-tab" onclick="filterCat('복지')">복지·돌봄</button>
    <button class="cat-tab" onclick="filterCat('취업')">취업·창업</button>
    <button class="cat-tab" onclick="filterCat('교육')">교육</button>
  </div>

  <div id="postList" style="padding-top:4px;">
    <div class="empty">불러오는 중...</div>
  </div>

  <div class="bottom-info">
    <div class="stats">
      <div class="stat"><div class="stat-num" id="todayCount">-</div><div class="stat-label">오늘</div></div>
      <div class="stat"><div class="stat-num" id="totalCount">-</div><div class="stat-label">누적 방문</div></div>
    </div>
    정부 공공데이터 기반 · 정확한 조건은 해당 기관에 확인하세요
  </div>

</div>

<footer class="footer">
  <p><a href="/"><strong>eloan.kr</strong></a><br>&copy; 2026</p>
</footer>

<script>
const CAT_MAP = {
  '청년': ['청년','취업준비','사회초년','청년월세','청년전세','도약계좌','청년내일'],
  '육아': ['육아','출산','양육','보육','유아','어린이','아이돌봄','신생아','영유아','누리과정','아동'],
  '주거': ['주거','월세','전세','대출','임대','주택','보증금','공공임대','LH','금융공사'],
  '복지': ['복지','기초','장애','노인','돌봄','수급','의료','건강보험','어르신','저소득','한부모'],
  '취업': ['취업','창업','고용','소상공인','근로','일자리','자영업','국민취업','직업훈련'],
  '교육': ['교육','학자금','장학','학비','학자','학교','대학','수업료','강좌']
};

function getPostCat(post) {
  const text = `${post.title||''} ${post.meta_description||''} ${(post.tags||[]).join(' ')} ${post.keyword||''}`.toLowerCase();
  for (const [cat, kws] of Object.entries(CAT_MAP)) {
    if (kws.some(kw => text.includes(kw))) return cat;
  }
  return '기타';
}

let allPosts = [];
let activeCat = '전체';

async function loadPosts() {
  try {
    const resp = await fetch('/blog/posts.json');
    if (!resp.ok) throw new Error();
    allPosts = await resp.json();
    renderPosts(allPosts);
  } catch(e) {
    document.getElementById('postList').innerHTML = '<div class="empty">아직 발행된 글이 없습니다.</div>';
  }
}

function renderPosts(posts) {
  const el = document.getElementById('postList');
  if (!posts.length) { el.innerHTML = '<div class="empty">글이 없습니다.</div>'; return; }
  el.innerHTML = posts.slice(0, 30).map(p => {
    const cat = getPostCat(p);
    return `<a href="/blog/${p.slug}.html" class="post-card">
      <div class="post-date">${p.date_iso || ''}</div>
      <div class="post-title">${p.title}</div>
      <div class="post-desc">${p.meta_description || ''}</div>
      <span class="post-cat">${cat}</span>
    </a>`;
  }).join('');
}

function filterCat(cat) {
  activeCat = cat;
  document.querySelectorAll('.cat-tab').forEach(t => t.classList.remove('active'));
  event.target.classList.add('active');
  if (cat === '전체') { renderPosts(allPosts); return; }
  renderPosts(allPosts.filter(p => getPostCat(p) === cat));
}

function handleSearch(e) {
  const q = e.target.value.trim().toLowerCase();
  if (!q) { renderPosts(activeCat === '전체' ? allPosts : allPosts.filter(p => getPostCat(p) === activeCat)); return; }
  renderPosts(allPosts.filter(p => {
    const text = `${p.title||''} ${p.meta_description||''} ${(p.tags||[]).join(' ')}`.toLowerCase();
    return text.includes(q);
  }));
}

function trackVisitor() {
  const today = new Date().toISOString().slice(0,10);
  const s = JSON.parse(localStorage.getItem('eloan_v') || '{}');
  if (!s.t) s.t = 0; if (!s.d) s.d = ''; if (!s.c) s.c = 0;
  if (s.d !== today) { s.c = 0; s.d = today; }
  if (!sessionStorage.getItem('ev')) { s.t++; s.c++; sessionStorage.setItem('ev','1'); localStorage.setItem('eloan_v',JSON.stringify(s)); }
  document.getElementById('todayCount').textContent = s.c;
  document.getElementById('totalCount').textContent = s.t.toLocaleString();
}

loadPosts();
trackVisitor();
</script>
</body>
</html>
